<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chapter 491 Goes to Budapest</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #111111;
            color: #ffffff;
            /* פתרון בעיית ההסתרה בנייד - מרווח תחתון קשיח */
            padding-bottom: 120px !important; 
        }
        .lightning-glow {
            filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.8));
        }
        .bg-metallica-pattern {
            background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)), url('https://images.unsplash.com/photo-1598387181032-a3103a2db5b3?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
    </style>
</head>
<body class="bg-metallica-pattern min-h-screen">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        // 1. ייבוא פיירבייס 
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            GoogleAuthProvider, 
            signInWithRedirect, 
            getRedirectResult, 
            signInAnonymously, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

        // ==========================================
        // ⚠️ חובה להדביק כאן את הגדרות הפיירבייס שלך! ⚠️
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY", // אמור להתחיל ב- AIzaSy...
            authDomain: "goes-to-budapest.firebaseapp.com",
            projectId: "goes-to-budapest",
            storageBucket: "goes-to-budapest.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            measurementId: "YOUR_MEASUREMENT_ID"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const analytics = getAnalytics(app);

        // --- הגדרות קבועות ---
        const STADIUM_ZONES = [
            "Snake Pit",
            "פלטפורמה",
            "דשא צמוד לבמה",
            "יציע 100",
            "יציע 200",
            "יציע 300"
        ];

        const BARS_AND_ATTRACTIONS = [
            { name: "BLS - Black Label Society (הופעה)", desc: "הופעת החימום הרשמית לפני מטאליקה", type: "music" },
            { name: "Liquid Rock", desc: "פאב רוק מטאל מעולה בלב העיר", type: "bar" },
            { name: "Rocktogon", desc: "מועדון רוק ופאב", type: "bar" },
            { name: "Starbucks Deák Ferenc", desc: "סניף סטארבקס מרכזי", type: "coffee" }
        ];

        const HOTEL_NAME = "Mövenpick Hotel Budapest Centre";

        function App() {
            const [user, setUser] = React.useState(null);
            const [errorMsg, setErrorMsg] = React.useState('');
            const [activeTab, setActiveTab] = React.useState('radar');
            
            // סטייט עבור מחשבון המרה
            const [amount, setAmount] = React.useState('');
            const [fromCurrency, setFromCurrency] = React.useState('HUF');
            const [toCurrency, setToCurrency] = React.useState('ILS');

            // הפעלת מערכת ההתחברות (כולל חזרה מגוגל)
            React.useEffect(() => {
                const initAuth = async () => {
                    try {
                        const result = await getRedirectResult(auth);
                        if (result?.user) {
                            setUser(result.user);
                            return; 
                        }
                    } catch (error) {
                        console.error("Redirect Error:", error);
                        setErrorMsg("שגיאה בסיום ההתחברות. נסה שוב.");
                    }

                    onAuthStateChanged(auth, (currentUser) => {
                        if (currentUser) {
                            setUser(currentUser);
                        } else {
                            signInAnonymously(auth).catch(err => {
                                console.error("Anonymous auth failed:", err);
                            });
                        }
                    });
                };
                initAuth();
            }, []);

            const handleGoogleLogin = async () => {
                setErrorMsg('מעביר אותך לגוגל להמשך התחברות...');
                try {
                    const provider = new GoogleAuthProvider();
                    await signInWithRedirect(auth, provider);
                } catch (error) {
                    console.error("Login Error:", error);
                    setErrorMsg(`שגיאה: ${error.message}`);
                }
            };

            const handleLogout = async () => {
                await signOut(auth);
                setUser(null);
                setActiveTab('radar');
            };

            // פונקציות המרה
            const convertCurrency = () => {
                // שערים משוערים להמחשה (כדאי לעדכן ליום הטיסה)
                const rates = { EUR: 1, ILS: 4.0, HUF: 390 };
                if (!amount) return 0;
                const baseEur = parseFloat(amount) / rates[fromCurrency];
                const result = baseEur * rates[toCurrency];
                return toCurrency === 'HUF' ? Math.round(result) : result.toFixed(2);
            };

            const swapCurrencies = () => {
                setFromCurrency(toCurrency);
                setToCurrency(fromCurrency);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen shadow-xl flex flex-col relative pb-8">
                    {/* כותרת עליונה */}
                    <header className="bg-gradient-to-b from-blue-900/90 to-black p-4 sticky top-0 z-50 border-b border-blue-500/50">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full bg-blue-900/40 flex items-center justify-center border-2 border-blue-400 lightning-glow">
                                <span className="text-2xl font-black italic tracking-tighter">M</span>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold block sm:inline">Chapter 491 Goes to Budapest</h1>
                                <p className="text-xs text-blue-300 flex items-center gap-1 mt-1">
                                    <i data-lucide="zap" className="w-3 h-3"></i> Ride the Lightning
                                </p>
                            </div>
                        </div>
                    </header>

                    {/* אזור תוכן מרכזי */}
                    <main className="flex-1 p-4 overflow-y-auto">
                        {errorMsg && (
                            <div className="bg-red-900/80 border border-red-500 text-white font-medium p-3 rounded-lg mb-4 text-sm text-center">
                                {errorMsg}
                            </div>
                        )}

                        {/* לשונית ראדאר */}
                        {activeTab === 'radar' && (
                            <div className="space-y-5">
                                {!user || user.isAnonymous ? (
                                    <div className="bg-blue-900/30 p-6 rounded-2xl border border-blue-500/30 text-center shadow-lg backdrop-blur-md">
                                        <i data-lucide="radar" className="w-12 h-12 text-blue-400 mx-auto mb-4 animate-pulse"></i>
                                        <h3 className="text-xl font-bold mb-2">ראדאר חברים חי</h3>
                                        <p className="text-sm text-gray-300 mb-6 leading-relaxed">התחבר עם חשבון הגוגל שלך כדי לשתף את המיקום המדויק באצטדיון ולמצוא חברים סביבך.</p>
                                        <button onClick={handleGoogleLogin} className="w-full bg-white text-black font-bold py-3 px-4 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-200 transition-all active:scale-95 shadow-md">
                                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" className="w-6 h-6" alt="Google" />
                                            התחבר עם חשבון Google
                                        </button>
                                    </div>
                                ) : (
                                    <div className="bg-green-900/40 border border-green-500/50 p-4 rounded-xl text-center backdrop-blur-md flex justify-between items-center">
                                        <div className="text-right">
                                            <p className="text-xs text-green-300">מחובר בהצלחה</p>
                                            <p className="text-white font-bold text-lg">{user.displayName}</p>
                                        </div>
                                        <button onClick={handleLogout} className="bg-red-900/50 hover:bg-red-800 text-red-200 px-4 py-2 rounded-lg text-sm font-medium transition">התנתק</button>
                                    </div>
                                )}
                                
                                <div className="mt-8">
                                    <h3 className="font-bold text-xl mb-4 border-b border-gray-700 pb-2 flex items-center gap-2">
                                        <i data-lucide="map" className="w-5 h-5 text-blue-400"></i> אזורי האצטדיון
                                    </h3>
                                    <div className="space-y-3">
                                        {STADIUM_ZONES.map(zone => (
                                            <div key={zone} className="bg-gray-800/80 p-4 rounded-xl flex justify-between items-center border border-gray-700 shadow-sm">
                                                <span className="font-bold text-blue-100 text-lg">{zone}</span>
                                                <span className="text-xs bg-blue-900/50 text-blue-200 border border-blue-700/50 px-3 py-1.5 rounded-full font-medium">התחבר כדי לצפות</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* לשונית מפות ומיקומים */}
                        {activeTab === 'map' && (
                            <div className="space-y-5">
                                <div className="bg-blue-900/30 p-5 rounded-2xl border border-blue-500/40 shadow-lg backdrop-blur-md">
                                    <div className="flex items-center gap-3 mb-2">
                                        <i data-lucide="building" className="w-6 h-6 text-blue-400"></i>
                                        <h3 className="font-bold text-xl text-blue-300">{HOTEL_NAME}</h3>
                                    </div>
                                    <p className="text-sm text-gray-300 mb-4">מלון המשלחת הרשמי</p>
                                    <button className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition-colors">
                                        <i data-lucide="navigation" className="w-5 h-5"></i> נווט למלון ב-Google Maps
                                    </button>
                                </div>

                                <h3 className="font-bold text-xl mt-8 mb-4 border-b border-gray-700 pb-2 flex items-center gap-2">
                                    <i data-lucide="beer" className="w-5 h-5 text-blue-400"></i> מוקדי עניין ובילויים
                                </h3>
                                <div className="space-y-4">
                                    {BARS_AND_ATTRACTIONS.map((item, idx) => (
                                        <div key={idx} className="bg-gray-800/80 p-5 rounded-xl border border-gray-700 shadow-md">
                                            <div className="flex justify-between items-start mb-2">
                                                <h4 className="font-bold text-white text-lg">{item.name}</h4>
                                                <span className="text-xs px-2 py-1 bg-gray-700 rounded text-gray-300 font-medium">{item.type}</span>
                                            </div>
                                            <p className="text-sm text-gray-400 mb-4">{item.desc}</p>
                                            <button className="w-full bg-gray-700 hover:bg-gray-600 text-white font-medium py-2.5 rounded-lg text-sm transition flex justify-center items-center gap-2">
                                                <i data-lucide="map-pin" className="w-4 h-4"></i> נווט לכאן
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* לשונית המרה */}
                        {activeTab === 'converter' && (
                            <div className="bg-gray-900/90 p-6 rounded-2xl border border-gray-700 shadow-2xl backdrop-blur-md">
                                <div className="flex items-center justify-center gap-2 mb-6">
                                    <i data-lucide="calculator" className="w-6 h-6 text-blue-400"></i>
                                    <h3 className="font-bold text-2xl text-white">מחשבון המרה</h3>
                                </div>
                                
                                <div className="flex items-center gap-3 mb-6">
                                    <select value={fromCurrency} onChange={(e) => setFromCurrency(e.target.value)} className="bg-gray-800 border border-gray-600 text-white p-3 rounded-xl flex-1 text-center font-bold outline-none focus:border-blue-500">
                                        <option value="HUF">HUF (פורינט)</option>
                                        <option value="ILS">ILS (שקל)</option>
                                        <option value="EUR">EUR (אירו)</option>
                                    </select>
                                    
                                    <button onClick={swapCurrencies} className="bg-blue-600 p-3 rounded-full hover:bg-blue-500 transition active:scale-90 shadow-md">
                                        <i data-lucide="arrow-left-right" className="w-5 h-5 text-white"></i>
                                    </button>

                                    <select value={toCurrency} onChange={(e) => setToCurrency(e.target.value)} className="bg-gray-800 border border-gray-600 text-white p-3 rounded-xl flex-1 text-center font-bold outline-none focus:border-blue-500">
                                        <option value="HUF">HUF (פורינט)</option>
                                        <option value="ILS">ILS (שקל)</option>
                                        <option value="EUR">EUR (אירו)</option>
                                    </select>
                                </div>

                                <div className="mb-8">
                                    <label className="block text-sm text-gray-400 mb-2 font-medium">הכנס סכום ({fromCurrency}):</label>
                                    <input 
                                        type="number" 
                                        value={amount} 
                                        onChange={(e) => setAmount(e.target.value)}
                                        className="w-full bg-gray-950 text-white text-3xl font-black p-4 rounded-xl border border-gray-700 text-center focus:outline-none focus:border-blue-500 transition shadow-inner"
                                        placeholder="0"
                                    />
                                </div>

                                <div className="bg-blue-900/40 p-5 rounded-xl text-center border border-blue-500/40 shadow-md">
                                    <p className="text-sm text-blue-300 mb-2 font-medium">סך הכל ב-{toCurrency}:</p>
                                    <p className="text-4xl font-black text-white tracking-wide" dir="ltr">
                                        {amount ? convertCurrency() : '0.00'}
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* ניווט תחתון (NavigationBar) */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-black/95 border-t border-gray-800 flex justify-around p-3 pb-safe z-50 backdrop-blur-xl">
                        <button onClick={() => setActiveTab('radar')} className={`flex flex-col items-center gap-1.5 p-2 w-20 rounded-xl transition-all ${activeTab === 'radar' ? 'text-blue-400 bg-blue-900/30 shadow-inner' : 'text-gray-500 hover:text-gray-300'}`}>
                            <i data-lucide="radar" className="w-6 h-6"></i>
                            <span className="text-[11px] font-bold">ראדאר</span>
                        </button>
                        <button onClick={() => setActiveTab('map')} className={`flex flex-col items-center gap-1.5 p-2 w-20 rounded-xl transition-all ${activeTab === 'map' ? 'text-blue-400 bg-blue-900/30 shadow-inner' : 'text-gray-500 hover:text-gray-300'}`}>
                            <i data-lucide="map-pin" className="w-6 h-6"></i>
                            <span className="text-[11px] font-bold">מיקומים</span>
                        </button>
                        <button onClick={() => setActiveTab('converter')} className={`flex flex-col items-center gap-1.5 p-2 w-20 rounded-xl transition-all ${activeTab === 'converter' ? 'text-blue-400 bg-blue-900/30 shadow-inner' : 'text-gray-500 hover:text-gray-300'}`}>
                            <i data-lucide="calculator" className="w-6 h-6"></i>
                            <span className="text-[11px] font-bold">המרה</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // אתחול האייקונים לאחר שהאפליקציה עולה
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
