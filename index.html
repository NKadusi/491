    function calculateDistanceDetailed(lat1, lon1, lat2, lon2) {
      if (!lat1 || !lon1 || !lat2 || !lon2) return null;
      const R = 6371; 
      const dLat = (lat2 - lat1) * (Math.PI/180);
      const dLon = (lon2 - lon1) * (Math.PI/180); 
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      const distKm = R * c; 
      return distKm < 1 ? `${Math.round(distKm * 1000)} מטר` : `${distKm.toFixed(1)} ק"מ`;
    }

    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'עכשיו';
      const minutes = Math.floor(seconds / 60);
      return minutes < 60 ? `לפני ${minutes} דק'` : `לפני ${Math.floor(minutes/60)} שע'`;
    }

          const distance = DEADLINE.getTime() - now;

          if (distance < 0) {
            setIsLocked(true);
            setTimeLeftStr('התחרות ננעלה!');
          } else {
            setIsLocked(false);
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                              <button onClick={handleCheckIn} disabled={isSaving} className="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-white transition active:scale-95">שמור מיקום</button>

                                  <i className="fa-solid fa-trash-can text-lg"></i>
                              </button>
                          </div>

                      <i className="fa-solid fa-arrow-up-right-from-square opacity-70"></i>

                    <button onClick={() => window.open('https://chat.whatsapp.com/Gw5h7ZSvmV0FcHUkdTzPUd', '_blank')} className="bg-[#25D366] hover:bg-[#1ebd57] text-black py-3 px-4 rounded-xl text-sm font-bold flex justify-between items-center transition shadow-md active:scale-95">

                </div>

            {activeTab === 'takeover' && (

                      <p className="text-xs text-gray-400 whitespace-pre-line">{p.desc}</p>

                    <div className="flex gap-2">
                        <button onClick={() => window.open(getMapUrl(p.lat, p.lng), '_blank')} className="bg-yellow-600 hover:bg-yellow-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition shrink-0"><i className="fa-solid fa-location-arrow"></i></button>
                    </div>
                  </div>
                ))}
              </div>

            {activeTab === 'transport' && (

                    <h4 className="font-bold text-white text-lg mb-4">BudapestGO</h4>
                    <div className="flex flex-col gap-2 w-full mt-auto">
                        <button onClick={() => window.open(bkkIOS, '_blank')} className="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-2 rounded-lg text-[10px] font-bold w-full flex justify-center items-center gap-1 transition">
                            <i className="fa-brands fa-apple text-sm"></i> App Store
                        </button>
                        <button onClick={() => window.open(bkkAndroid, '_blank')} className="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-2 rounded-lg text-[10px] font-bold w-full flex justify-center items-center gap-1 transition">
                            <i className="fa-brands fa-google-play text-green-400 text-xs"></i> Google Play
                        </button>
                    </div>
                  </div>

                </div>
              </div>
            )}

            {activeTab === 'currency' && (
              <div className="bg-black/80 border border-gray-800 rounded-2xl p-6 text-center shadow-2xl">
                <h2 className="text-2xl font-bold text-white mb-6">מחשבון המרה</h2>
                <div className="flex flex-col gap-4 w-full max-w-sm mx-auto">
                  <div className="flex gap-2 w-full">
                    <input type="number" value={exchangeAmount} onChange={e => setExchangeAmount(e.target.value)} className="flex-1 bg-gray-900 border border-gray-700 rounded-xl p-3 text-white text-xl font-bold text-center outline-none focus:border-blue-500 w-full" dir="ltr" />
                    <select value={fromCurrency} onChange={e => setFromCurrency(e.target.value)} className="w-20 shrink-0 bg-gray-900 border border-gray-700 rounded-xl text-white font-bold p-2 text-center outline-none">

                  <button onClick={() => { const f = fromCurrency; setFromCurrency(toCurrency); setToCurrency(f); }} className="w-10 h-10 bg-blue-600 hover:bg-blue-500 rounded-full mx-auto text-white flex items-center justify-center active:scale-90 transition shadow-lg my-1">

                  <div className="flex gap-2 w-full">
                    <div className="flex-1 bg-gray-900 border border-blue-500/30 rounded-xl p-3 text-2xl font-bold text-blue-400 flex items-center justify-center w-full overflow-hidden" dir="ltr">
                        {convertCurrency()}
                    </div>
                    <select value={toCurrency} onChange={e => setToCurrency(e.target.value)} className="w-20 shrink-0 bg-gray-900 border border-gray-700 rounded-xl text-white font-bold p-2 text-center outline-none">
                      <option value="HUF">Ft</option><option value="ILS">₪</option><option value="EUR">€</option>
                    </select>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'bars' && (
              <div className="space-y-6">
                <div className="bg-black/60 border border-gray-800 rounded-2xl p-6 shadow-lg">
                  <h2 className="font-bold text-white mb-4">חיפוש חופשי בעיר <i className="fa-brands fa-google text-blue-400"></i></h2>
                  <div className="flex gap-2">
                    <input type="text" placeholder="סופרמרקט, פארם..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="flex-1 bg-gray-900 border border-gray-700 rounded-xl p-3 text-white outline-none focus:border-blue-500 w-full" />
                    <button onClick={() => window.open(getMapSearchUrl(searchQuery + ' Budapest'), '_blank')} className="bg-blue-600 hover:bg-blue-500 px-4 rounded-xl text-white active:scale-95 transition shrink-0"><i className="fa-solid fa-search"></i></button>
                  </div>
                  <div className="flex flex-wrap gap-2 mt-4">
                    {['רוק ברים', 'גיטרות', 'סטארבקס', 'אוכל'].map(tag => (
                      <button key={tag} onClick={() => window.open(getMapSearchUrl(tag + ' Budapest'), '_blank')} className="bg-gray-800 px-3 py-1.5 rounded-full text-xs text-gray-300 border border-gray-700 hover:bg-gray-700 transition">{tag}</button>

                  </div>
                </div>
                <div className="space-y-4">
                  <h2 className="text-xl font-bold text-white border-b border-gray-800 pb-2">מומלצים</h2>
                  {CURATED_BARS.map(item => (
                    <div key={item.name} className="bg-black/60 border border-gray-800 rounded-2xl p-4 flex justify-between items-center shadow-lg">
                      <div className="flex-1 pl-2"><h4 className="font-bold text-white">{item.name}</h4><p className="text-xs text-gray-400 mt-1">{item.desc}</p></div>
                      <button onClick={() => window.open(getMapSearchUrl(item.name + ' Budapest'), '_blank')} className="text-red-500 bg-gray-800 hover:bg-gray-700 w-10 h-10 rounded-xl flex items-center justify-center shrink-0 active:scale-90 transition"><i className="fa-solid fa-location-dot"></i></button>
                    </div>

            {activeTab === 'game' && (

                  <div className="bg-gradient-to-r from-yellow-900/40 to-orange-900/40 border border-yellow-800/50 rounded-2xl p-6 shadow-xl text-center">
                    <h2 className="text-2xl font-bold text-yellow-400 mb-2 flex items-center justify-center gap-2">
                      <i className="fa-solid fa-trophy text-yellow-500"></i>
                      תוצאות תחרות הסטליסט!

                    <p className="text-sm text-gray-300 mb-4">
                      הסטליסט הרשמי פורסם! הנה דירוג המנחשים של המשלחת:

                    <div className="text-[10px] sm:text-xs bg-black/40 p-2 rounded-lg inline-block text-gray-400 mb-6">
                      בול בפגיעה (מיקום נכון) = <strong className="text-yellow-500">5 נק'</strong> | שיר נכון במיקום אחר = <strong className="text-blue-400">2 נק'</strong>

                    <div className="space-y-3">

                  <div className="bg-gradient-to-r from-purple-900/40 to-blue-900/40 border border-purple-800/50 rounded-2xl p-6 shadow-xl">

                      תחרות הסטליסט

                      <strong className="text-purple-300">חוקי הניקוד:</strong><br/>

                    <div className={`mb-6 p-3 rounded-xl border text-center font-bold shadow-lg transition-colors ${isLocked ? 'bg-red-900/60 border-red-500 text-red-200' : 'bg-purple-900/50 border-purple-500 text-purple-200'}`}>

                              onClick={() => {
                                if (window.confirm("בטוח שברצונך למחוק את כל 16 הבחירות?")) {
                                  setMyPrediction(Array(16).fill(""));
                                }
                              }}
                              disabled={isSaving}
                              className="text-xs bg-red-900/40 text-red-400 border border-red-800 hover:bg-red-800 hover:text-white px-3 py-1.5 rounded-lg transition disabled:opacity-50"
                            >
                              <i className="fa-solid fa-trash-can mr-1"></i> מחיקת הכל
                            </button>
                          )}
                        </div>

                        <div className="grid grid-cols-1 gap-2">
                          {myPrediction.map((song, idx) => (
                            <div key={idx} className="flex items-center gap-3 bg-black/40 border border-gray-700 p-2 rounded-xl shadow-inner">
                              <div className="w-8 h-8 flex items-center justify-center bg-gray-800 rounded-lg text-gray-400 font-bold shrink-0">{idx + 1}</div>
                              <button 
                                onClick={() => !isLocked && setShowSongPicker(idx)}
                                disabled={isLocked}
                                className={`flex-1 text-right text-sm px-3 py-2 rounded-lg transition border truncate ${song ? 'bg-blue-900/30 border-blue-800/50 text-white font-bold' : 'bg-gray-800 border-gray-700 text-gray-400 hover:bg-gray-700'}`}
                                dir="ltr"
                              >
                                <div className="text-left w-full truncate">{song || "Tap to select a song..."}</div>
                              </button>
                            </div>
                          ))}
                        </div>

                        <button 
                          onClick={handleSavePrediction}
                          disabled={isLocked || isSaving}
                          className={`w-full py-4 mt-4 rounded-xl font-bold text-lg shadow-lg flex justify-center items-center gap-2 transition ${isLocked ? 'bg-gray-700 text-gray-500 cursor-not-allowed' : 'bg-purple-600 hover:bg-purple-500 text-white active:scale-95'}`}
                        >
                          {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-save"></i>}
                          שמור את הניחוש שלי
                        </button>
                      </div>
                    )}
                    
                    {/* --- רשימת משתתפים שכבר נרשמו --- */}
                    <div className="mt-8 pt-6 border-t border-purple-900/50">
                      <h3 className="font-bold text-purple-300 mb-3 flex items-center gap-2">
                        <i className="fa-solid fa-users"></i> {allPredictions.length} חברים כבר שלחו ניחוש:
                      </h3>
                      {allPredictions.length > 0 ? (
                        <div className="flex flex-wrap gap-2">
                          {allPredictions.map(p => (
                            <div key={p.id} className="bg-black/50 border border-purple-800/30 px-3 py-1.5 rounded-full text-xs text-purple-200 flex items-center gap-2 shadow-sm">
                              <i className="fa-solid fa-check text-green-500"></i> {p.name}
                            </div>
                          ))}
                        </div>
                      ) : (
                        <p className="text-xs text-gray-500">עדיין אין נרשמים למשחק. תהיו הראשונים!</p>
                      )}
                    </div>
                  </div>
                )}

                {/* מודאל בחירת השירים המלא והמתוקן */}
                {showSongPicker !== null && (
                  <div className="fixed inset-0 bg-black/95 z-[100] flex flex-col p-4 backdrop-blur-md animate-in fade-in">
                    <div className="flex justify-between items-center mb-4 pt-safe">
                      <h3 className="text-xl font-bold text-white">בחר שיר (מקום {showSongPicker + 1})</h3>
                      <button onClick={() => {setShowSongPicker(null); setSongSearchLocal('');}} className="w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center text-white active:scale-90 transition">
                        <i className="fa-solid fa-times"></i>
                      </button>
                    </div>
                    
                    <input 
                      type="text" 
                      placeholder="Search song..." 
                      value={songSearchLocal}
                      onChange={e => setSongSearchLocal(e.target.value)}
                      className="w-full bg-gray-800 border border-gray-600 rounded-xl p-4 text-white text-lg mb-4 outline-none focus:border-purple-500"
                      dir="ltr"
                    />

                    <div className="flex-1 overflow-y-auto space-y-4 pb-safe relative">
                      {METALLICA_ALBUMS.map(album => {
                        const filteredSongs = album.songs.filter(s => s.toLowerCase().includes(songSearchLocal.toLowerCase()));
                        if (filteredSongs.length === 0) return null;

                        return (
                          <div key={album.title} className="mb-2">
                            <h4 className="text-purple-400 font-bold mb-3 text-sm sticky top-0 bg-black/95 py-2 z-10 border-b border-purple-900/50 flex items-center gap-2" dir="ltr">
                              <i className="fa-solid fa-compact-disc text-purple-600"></i>
                              {album.title}
                            </h4>
                            <div className="space-y-2 pl-2 border-l border-gray-800 ml-2">
                              {filteredSongs.map(song => {
                                const isSelected = myPrediction.includes(song);
                                return (
                                  <button 
                                    key={song}
                                    onClick={() => {
                                      const newPred = [...myPrediction];
                                      newPred[showSongPicker] = song;
                                      setMyPrediction(newPred);
                                      setShowSongPicker(null);
                                      setSongSearchLocal('');
                                    }}
                                    className={`w-full text-left p-3 rounded-xl border transition flex justify-between items-center ${isSelected ? 'bg-gray-800 border-gray-700 opacity-50 cursor-not-allowed' : 'bg-black/60 border-purple-900/30 hover:bg-purple-900/40 text-white active:scale-95'}`}
                                    disabled={isSelected}
                                    dir="ltr"
                                  >
                                    <span className="font-medium text-sm">{song}</span>
                                    {isSelected && <i className="fa-solid fa-check text-green-500"></i>}
                                  </button>
                                );
                              })}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            )}

            {/* --- פאנל האדמין שיופיע רק אם הופעל --- */}
            {activeTab === 'admin' && isAdmin && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-red-900/20 border border-red-500/50 rounded-2xl p-6 shadow-xl text-center">
                  <h2 className="text-2xl font-bold text-red-400 mb-2 flex items-center justify-center gap-2">
                    <i className="fa-solid fa-lock-open text-red-500"></i>
                    פאנל מנהלים סודי
                  </h2>
                  <p className="text-sm text-gray-300 mb-4">
                    הדבק כאן את הסטליסט האמיתי מההופעה (טקסט חופשי). המערכת תנקה את המספרים ותפרסם לכולם את טבלת המובילים!
                  </p>
                  
                  <textarea 
                    value={adminInput}
                    onChange={(e) => setAdminInput(e.target.value)}
                    placeholder="הדבק את רשימת השירים כאן..."
                    className="w-full h-64 bg-black/60 border border-red-800 rounded-xl p-4 text-white outline-none focus:border-red-500 mb-4"
                    dir="ltr"
                  />
                  
                  <button 
                    onClick={handlePublishSetlist}
                    disabled={isSaving || !adminInput.trim()}
                    className="w-full bg-red-600 hover:bg-red-500 disabled:opacity-50 text-white font-bold py-4 rounded-xl shadow-lg transition active:scale-95 flex items-center justify-center gap-2"
                  >
                    {isSaving ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-bullhorn"></i>}
                    פרסם את הסטליסט וחשב תוצאות!
                  </button>
                </div>
              </div>
            )}

          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-gray-800 z-50 overflow-x-auto scrollbar-hide">
            <div className="max-w-lg mx-auto flex justify-between px-1 py-2 mb-safe min-w-max md:min-w-0">
              {[
                { id: 'friends', icon: 'fa-street-view', label: 'רדאר' },
                { id: 'takeover', icon: 'fa-meteor', label: 'Takeover' },
                { id: 'game', icon: 'fa-clipboard-list', label: 'ניחושים', highlight: true }, // Highlight
                { id: 'map', icon: 'fa-map-location-dot', label: 'מפות' },
                { id: 'transport', icon: 'fa-train-subway', label: 'תחבורה' },
                { id: 'currency', icon: 'fa-money-bill-transfer', label: 'המרה' },
                { id: 'bars', icon: 'fa-beer-mug-empty', label: 'בילויים' }
              ].map(tab => (
                <button 
                   key={tab.id} 
                   onClick={() => setActiveTab(tab.id)} 
                   className={`flex flex-col items-center justify-center px-3 py-2 mx-1 rounded-xl transition-all flex-1 min-w-[60px] 
                   ${activeTab === tab.id 
                      ? (tab.highlight ? 'text-purple-400 bg-purple-900/20' : 'text-blue-400 bg-blue-900/20') 
                      : (tab.highlight ? 'text-purple-400 opacity-80 hover:opacity-100 hover:bg-purple-900/10' : 'text-gray-500 hover:text-gray-300')
                   }`}
                >
                  <i className={`fa-solid ${tab.icon} text-lg md:text-xl mb-1`}></i>
                  <span className="text-[10px] font-bold whitespace-nowrap">{tab.label}</span>
                </button>
              ))}
              
              {/* כפתור לאדמין בתפריט התחתון שיופיע רק אחרי הקשות הסתר */}
              {isAdmin && (
                <button onClick={() => setActiveTab('admin')} className={`flex flex-col items-center justify-center px-3 py-2 mx-1 rounded-xl transition-all flex-1 min-w-[60px] ${activeTab === 'admin' ? 'text-red-400 bg-red-900/20' : 'text-red-900 hover:text-red-400'}`}>
                  <i className="fa-solid fa-user-secret text-lg md:text-xl mb-1"></i>
                  <span className="text-[10px] font-bold whitespace-nowrap">אדמין</span>
                </button>
              )}
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
