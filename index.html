  <style>

</head>
<body class="text-neutral-200">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo } = React;

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-analytics.js";

    // --- הגדרות פיירבייס ---
    const firebaseConfig = {
      apiKey: "AIzaSyC7EreIS4PMeQtPEsQu35y2_UlcNl3c8VI",
      authDomain: "goes-to-budapest.firebaseapp.com",
      projectId: "goes-to-budapest",
      storageBucket: "goes-to-budapest.firebasestorage.app",
      messagingSenderId: "488923007392",
      appId: "1:488923007392:web:8b657382aab11109a2bcc5",
      measurementId: "G-4QXV4Q37KH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let analytics = null;
    try { analytics = getAnalytics(app); } catch (e) {}
    const databaseAppId = 'metallica-budapest-app';

    // --- נתונים קבועים ---
    const STADIUM_ZONES = ["Snake Pit", "פלטפורמה", "דשא צמוד לבמה", "דשא עמידה (GA)", "יציע 100", "יציע 200", "יציע 300", "מתחם אוכל", "בדרך לאצטדיון"];
    const HOTEL_COORDS = { lat: 47.5023, lng: 19.0531 };

    const PLACES = [
      { id: 'hotel', name: 'Mövenpick Hotel Budapest Centre', type: 'hotel', lat: 47.5023, lng: 19.0531, desc: 'בסיס האם של המשלחת', icon: 'fa-solid fa-hotel', color: 'text-yellow-500' },
      { id: 'stadium', name: 'אצטדיון פושקש', type: 'stadium', lat: 47.5030, lng: 19.0980, desc: 'כאן קורה הקסם (מטרו M2)', icon: 'fa-solid fa-music', color: 'text-red-500' },
      { id: 'bls', name: 'מועדון Barba Negra', type: 'concert', lat: 47.4526, lng: 19.0594, desc: 'הופעת BLS ב-10.6', icon: 'fa-solid fa-guitar', color: 'text-orange-500' },
      { id: 'popup', name: 'חנות פופ-אפ מטאליקה', type: 'store', lat: 47.4975, lng: 19.0550, desc: 'מרצ\'נדייז רשמי', icon: 'fa-solid fa-bag-shopping', color: 'text-gray-300' }
    ];

    const CURATED_BARS = [
      { name: 'Szimpla Kert', desc: 'ה-Ruin Bar המפורסם בעולם. חובה.' },
      { name: 'Instant-Fogas', desc: 'קומפלקס מסיבות ענק ופרוע.' },
      { name: 'Liquid Rock', desc: 'בר רוק מעולה לחברים.' }
    ];

    // --- Helpers ---
    function calculateDistanceDetailed(lat1, lon1, lat2, lon2) {
      if (!lat1 || !lon1 || !lat2 || !lon2) return null;
      const R = 6371; 
      const dLat = (lat2 - lat1) * (Math.PI/180);
      const dLon = (lon2 - lon1) * (Math.PI/180); 
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      const distKm = R * c; 
      if (distKm < 1) return `${Math.round(distKm * 1000)} מטר ממך`;
      return `${distKm.toFixed(1)} ק"מ ממך`;
    }

    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'עכשיו';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `לפני ${minutes} דק'`;
      return `לפני ${Math.floor(minutes/60)} שעות`;
    }

    function App() {
      const [activeTab, setActiveTab] = useState('friends');
      const [user, setUser] = useState(null);
      const [checkins, setCheckins] = useState([]);
      const [selectedZone, setSelectedZone] = useState(STADIUM_ZONES[0]);
      const [statusMessage, setStatusMessage] = useState('');
      const [useGps, setUseGps] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [showCheckInForm, setShowCheckInForm] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [myLocation, setMyLocation] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');

      // Currency State
      const [exchangeAmount, setExchangeAmount] = useState(100);
      const [fromCurrency, setFromCurrency] = useState('ILS');
      const [toCurrency, setToCurrency] = useState('HUF');
      const RATES = { ILS: 96.5, EUR: 395.0, HUF: 1 };

      useEffect(() => {
        const initAuth = async () => {
          try {
            const result = await getRedirectResult(auth);
            if (result?.user) { setUser(result.user); return; }
          } catch (e) { console.error(e); }

          onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) setUser(currentUser);
            else signInAnonymously(auth);
          });
        };
        initAuth();
      }, []);

      useEffect(() => {
        if (!user) return;
        const checkinsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins');
        return onSnapshot(checkinsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setCheckins(data.sort((a, b) => b.timestamp - a.timestamp));
        });
      }, [user]);

      useEffect(() => {
        if (useGps && navigator.geolocation) {
          const watchId = navigator.geolocation.watchPosition(
            (pos) => setMyLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            null, { enableHighAccuracy: true }
          );
          return () => navigator.geolocation.clearWatch(watchId);
        }
      }, [useGps]);

      const handleGoogleLogin = () => {
        setErrorMsg('מעביר לגוגל...');
        signInWithRedirect(auth, new GoogleAuthProvider());
      };

      const handleCheckIn = async () => {
        if (!user) return;
        setIsSaving(true);
        let gps = null;
        if (useGps) {
          try {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
            gps = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          } catch (e) {}
        }
        await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid), {
          name: user.isAnonymous ? "אורח" : user.displayName,
          photoURL: user.photoURL || "",
          zone: selectedZone,
          message: statusMessage,
          timestamp: Date.now(),
          userId: user.uid,
          location: gps
        });
        setIsSaving(false);
        setShowCheckInForm(false);
      };

      const convertedVal = useMemo(() => {
        return ((exchangeAmount * RATES[fromCurrency]) / RATES[toCurrency]).toLocaleString('en-US', { 
          maximumFractionDigits: toCurrency === 'HUF' ? 0 : 2 
        });
      }, [exchangeAmount, fromCurrency, toCurrency]);

      const checkinsByZone = useMemo(() => {
        const grouped = {};
        STADIUM_ZONES.forEach(z => grouped[z] = []);
        checkins.forEach(c => { if(grouped[c.zone]) grouped[c.zone].push(c); });
        return grouped;
      }, [checkins]);

      return (
        <div className="min-h-screen flex flex-col">
          {/* Header */}
          <header className="bg-neutral-900/80 backdrop-blur-md border-b border-neutral-800 p-4 sticky top-0 z-50 shadow-lg">
            <div className="max-w-2xl mx-auto flex items-center justify-between">
              <div className="flex items-center gap-3">
                <img 
                  src="https://scontent.ftlv6-1.fna.fbcdn.net/v/t39.30808-6/326804034_1124219691493080_4014716352676450050_n.jpg?_nc_cat=106&ccb=1-7&_nc_sid=1d70fc&oh=00_Af46iSC6rYn8ldlBXSQyNWEwX_7SJZsxRej7M2PoUzRz_w&oe=6A06D57A" 
                  className="w-12 h-12 rounded-full border-2 border-blue-500 object-cover lightning-glow" 
                  alt="Logo"
                />
                <div>
                  <h1 className="text-lg font-bold text-white tracking-wider">CHAPTER 491 <span className="text-blue-500">BUDAPEST</span></h1>
                  <p className="text-[10px] text-neutral-400">הראדאר של המשלחת הישראלית 🤘</p>
                </div>
              </div>
              {!user?.isAnonymous && (
                <button onClick={() => signOut(auth)} className="text-neutral-500 hover:text-white"><i className="fa-solid fa-right-from-bracket text-xl"></i></button>
              )}
            </div>
          </header>

          <main className="max-w-2xl mx-auto p-4 pb-safe flex-1 w-full">
            
            {/* RADAR TAB */}
            {activeTab === 'friends' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-blue-900/10 border border-blue-900/30 rounded-xl p-5 shadow-lg">
                  {user?.isAnonymous ? (
                    <div className="text-center py-4 space-y-4">
                      <h2 className="text-xl font-bold text-white">איפה כולם באצטדיון?</h2>
                      <button onClick={handleGoogleLogin} className="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3 shadow-lg">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" className="w-5 h-5" />
                        התחבר עם גוגל
                      </button>
                    </div>
                  ) : (
                    <div>
                      <div className="flex justify-between items-center mb-4">
                        <h2 className="font-bold text-white text-lg">אהלן, {user.displayName}!</h2>
                        <button onClick={() => setShowCheckInForm(true)} className="bg-blue-600 px-4 py-2 rounded-lg text-sm font-bold">עדכן מיקום</button>
                      </div>
                      
                      {showCheckInForm && (
                        <div className="space-y-4 bg-neutral-900 p-4 rounded-lg border border-neutral-700 mb-4">
                          <select value={selectedZone} onChange={e => setSelectedZone(e.target.value)} className="w-full bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-white">
                            {STADIUM_ZONES.map(z => <option key={z} value={z}>{z}</option>)}
                          </select>
                          <input type="text" placeholder="הודעה לחברים..." value={statusMessage} onChange={e => setStatusMessage(e.target.value)} className="w-full bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-white" />
                          <div className="flex items-center gap-2 text-sm">
                            <input type="checkbox" checked={useGps} onChange={e => setUseGps(e.target.checked)} />
                            <span>שתף מרחק מדויק (GPS)</span>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={handleCheckIn} disabled={isSaving} className="flex-1 bg-blue-600 py-3 rounded-lg font-bold">בצע צ'ק-אין</button>
                            <button onClick={() => setShowCheckInForm(false)} className="px-6 bg-neutral-700 py-3 rounded-lg">ביטול</button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div className="space-y-4">
                  {STADIUM_ZONES.map(zone => {
                    const zoneCheckins = checkinsByZone[zone];
                    if (!zoneCheckins || zoneCheckins.length === 0) return null;
                    return (
                      <div key={zone} className="bg-neutral-900 border border-neutral-800 rounded-xl overflow-hidden">
                        <div className="bg-neutral-800/50 px-4 py-2 flex justify-between items-center">
                          <h4 className="font-bold text-sm text-blue-400">{zone}</h4>
                          <span className="text-[10px] bg-neutral-950 px-2 py-1 rounded text-neutral-400">{zoneCheckins.length} חברים</span>
                        </div>
                        <div className="divide-y divide-neutral-800/30">
                          {zoneCheckins.map(c => (
                            <div key={c.id} className="p-3 flex gap-3 items-center">
                              <img src={c.photoURL || 'https://placehold.co/100x100/171717/3b82f6?text=🤘'} className="w-10 h-10 rounded-full border border-neutral-700" />
                              <div className="flex-1">
                                <div className="flex justify-between">
                                  <span className="font-bold text-sm">{c.name}</span>
                                  <span className="text-[10px] text-neutral-500">{timeAgo(c.timestamp)}</span>
                                </div>
                                {c.message && <p className="text-xs text-neutral-400">{c.message}</p>}
                                {c.location && myLocation && c.userId !== user?.uid && (
                                  <div className="text-[10px] text-green-400 mt-1"><i className="fa-solid fa-location-arrow"></i> {calculateDistanceDetailed(myLocation.lat, myLocation.lng, c.location.lat, c.location.lng)}</div>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* MAP TAB */}
            {activeTab === 'map' && (
              <div className="space-y-4 animate-in fade-in">
                {PLACES.map(p => (
                  <div key={p.id} className="bg-neutral-900 border border-neutral-800 rounded-xl p-4 flex gap-4 items-center">
                    <div className={`w-12 h-12 rounded-full bg-neutral-950 flex items-center justify-center text-xl shrink-0 ${p.color}`}><i className={p.icon}></i></div>
                    <div className="flex-1">
                      <h3 className="font-bold text-white">{p.name}</h3>
                      <p className="text-xs text-neutral-400">{p.desc}</p>
                    </div>
                    <button onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`, '_blank')} className="bg-neutral-800 p-3 rounded-lg"><i className="fa-solid fa-map-location-dot"></i></button>
                  </div>
                ))}
              </div>
            )}

            {/* TRANSPORT TAB */}
            {activeTab === 'transport' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-red-900/10 border border-red-900/30 rounded-xl p-5">
                  <h2 className="text-xl font-bold text-white mb-3">מטרו M2 (הקו האדום)</h2>
                  <p className="text-sm text-neutral-300">הדרך הטובה ביותר לאצטדיון. רדו בתחנת <strong>Puskás Ferenc Stadion</strong>. אל תקחו מוניות לאזור!</p>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-neutral-900 p-4 rounded-xl text-center border border-neutral-800">
                    <h4 className="font-bold mb-2">Bolt</h4>
                    <p className="text-[10px] text-neutral-400 mb-3">אין Uber בבודפשט!</p>
                    <a href="https://bolt.eu/" target="_blank" className="bg-yellow-600 text-black px-4 py-2 rounded-lg text-xs font-bold block">הורדת Bolt</a>
                  </div>
                  <div className="bg-neutral-900 p-4 rounded-xl text-center border border-neutral-800">
                    <h4 className="font-bold mb-2">BudapestGO</h4>
                    <p className="text-[10px] text-neutral-400 mb-3">כרטיסים דיגיטליים</p>
                    <a href="https://bkk.hu/en/tickets-and-passes/budapestgo/" target="_blank" className="bg-blue-600 text-white px-4 py-2 rounded-lg text-xs font-bold block">הורדת אפליקציה</a>
                  </div>
                </div>
              </div>
            )}

            {/* CURRENCY TAB */}
            {activeTab === 'currency' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-6 text-center shadow-lg">
                  <h2 className="text-2xl font-bold text-white mb-6">מחשבון המרה</h2>
                  <div className="space-y-4 max-w-xs mx-auto">
                    <div className="flex gap-2">
                      <input type="number" value={exchangeAmount} onChange={e => setExchangeAmount(e.target.value)} className="flex-1 bg-neutral-950 border border-neutral-700 rounded-lg p-3 text-white text-left font-mono" dir="ltr" />
                      <select value={fromCurrency} onChange={e => setFromCurrency(e.target.value)} className="w-24 bg-neutral-950 border border-neutral-700 rounded-lg p-3 text-white">
                        <option value="ILS">ILS ₪</option>
                        <option value="HUF">HUF Ft</option>
                        <option value="EUR">EUR €</option>
                      </select>
                    </div>
                    <button onClick={() => { const f = fromCurrency; setFromCurrency(toCurrency); setToCurrency(f); }} className="text-neutral-500 hover:text-white transition"><i className="fa-solid fa-arrow-right-arrow-left rotate-90"></i></button>
                    <div className="flex gap-2">
                      <div className="flex-1 bg-neutral-800 border border-neutral-700 rounded-lg p-3 text-left font-mono font-bold text-xl text-blue-400 overflow-hidden">{convertedVal}</div>
                      <select value={toCurrency} onChange={e => setToCurrency(e.target.value)} className="w-24 bg-neutral-950 border border-neutral-700 rounded-lg p-3 text-white">
                        <option value="HUF">HUF Ft</option>
                        <option value="ILS">ILS ₪</option>
                        <option value="EUR">EUR €</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* BARS TAB */}
            {activeTab === 'bars' && (
              <div className="space-y-6 animate-in fade-in">
                <div className="bg-neutral-900 border border-neutral-800 rounded-xl p-5 shadow-lg">
                  <h2 className="font-bold text-white mb-3">חיפוש חופשי בעיר</h2>
                  <div className="flex gap-2">
                    <input 
                      type="text" placeholder="למשל: סופרמרקט, בית מרקחת..." 
                      value={searchQuery} onChange={e => setSearchQuery(e.target.value)}
                      className="flex-1 bg-neutral-950 border border-neutral-700 rounded-lg p-3 text-white text-sm"
                    />
                    <button onClick={() => window.open(`https://www.google.com/maps/search/${encodeURIComponent(searchQuery + ' Budapest')}`, '_blank')} className="bg-blue-600 px-4 rounded-lg"><i className="fa-solid fa-search"></i></button>
                  </div>
                  <div className="flex flex-wrap gap-2 mt-4">
                    {['פאבים של רוק', 'חנויות גיטרות', 'סטארבקס', 'מסעדות'].map(tag => (
                      <button key={tag} onClick={() => window.open(`https://www.google.com/maps/search/${encodeURIComponent(tag + ' in Budapest')}`, '_blank')} className="bg-neutral-800 px-3 py-1.5 rounded-full text-[10px] text-neutral-300 border border-neutral-700">{tag}</button>
                    ))}
                  </div>
                </div>

                <div className="space-y-4">
                  <h2 className="text-xl font-bold text-white border-b border-neutral-800 pb-2">מקומות מומלצים 🤘</h2>
                  {CURATED_BARS.map(item => (
                    <div key={item.name} className="bg-neutral-900 border border-neutral-800 rounded-xl p-4 flex justify-between items-center">
                      <div><h4 className="font-bold">{item.name}</h4><p className="text-xs text-neutral-400">{item.desc}</p></div>
                      <button onClick={() => window.open(`https://www.google.com/maps/search/${encodeURIComponent(item.name + ' Budapest')}`, '_blank')} className="text-blue-400 p-2"><i className="fa-solid fa-location-dot text-xl"></i></button>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </main>

          {/* Navigation Bar */}
          <nav className="fixed bottom-0 left-0 right-0 bg-neutral-900/95 backdrop-blur-lg border-t border-neutral-800 z-50">
            <div className="max-w-2xl mx-auto flex justify-between px-1 py-3">
              {[
                { id: 'friends', icon: 'fa-users', label: 'ראדאר' },
                { id: 'map', icon: 'fa-map-location-dot', label: 'מפות' },
                { id: 'transport', icon: 'fa-train-subway', label: 'תחבורה' },
                { id: 'currency', icon: 'fa-wallet', label: 'המרה' },
                { id: 'bars', icon: 'fa-beer-mug-empty', label: 'בילויים' }
              ].map(tab => (
                <button 
                  key={tab.id}
                  onClick={() => setActiveTab(tab.id)} 
                  className={`flex flex-col items-center justify-center w-full transition-all ${activeTab === tab.id ? 'text-blue-400 scale-110' : 'text-neutral-500'}`}
                >
                  <i className={`fa-solid ${tab.icon} text-xl mb-1`}></i>
                  <span className="text-[10px] font-medium">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
