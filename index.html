    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'עכשיו';
      const minutes = Math.floor(seconds / 60);
      return minutes < 60 ? `לפני ${minutes} דק'` : `לפני ${Math.floor(minutes/60)} שע'`;
    }

    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 text-center bg-red-900/90 text-white min-h-screen flex flex-col justify-center items-center">
              <i className="fa-solid fa-triangle-exclamation text-5xl mb-4 text-red-400"></i>
              <h1 className="text-2xl font-bold mb-2">משהו השתבש</h1>
              <p className="text-sm mb-6" dir="ltr">{this.state.error.message}</p>
              <button onClick={() => window.location.reload()} className="bg-white text-red-900 font-bold px-6 py-3 rounded-xl shadow-lg">רענן אפליקציה</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    function App() {
      const [activeTab, setActiveTab] = useState('friends');
      const [user, setUser] = useState(null);
      const [checkins, setCheckins] = useState([]);
      const [communityBars, setCommunityBars] = useState([]);
      
      const [exchangeRates, setExchangeRates] = useState({ ILS: 1, EUR: 0.25, HUF: 98.0 });
      const [ratesStatus, setRatesStatus] = useState('טוען שערים...');
      
      const [myPrediction, setMyPrediction] = useState(Array(16).fill(""));
      const [officialSetlist, setOfficialSetlist] = useState(null);
      const [allPredictions, setAllPredictions] = useState([]);
      const [isLocked, setIsLocked] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [secretClicks, setSecretClicks] = useState(0);

      const [showCheckInForm, setShowCheckInForm] = useState(false);
      const [showAddBarForm, setShowAddBarForm] = useState(false);
      const [showSongPicker, setShowSongPicker] = useState(null);
      const [isSaving, setIsSaving] = useState(false);
      const [songSearchLocal, setSongSearchLocal] = useState('');
      const [timeLeftStr, setTimeLeftStr] = useState('');

      const [selectedZone, setSelectedZone] = useState(STADIUM_ZONES[0]);
      const [statusMessage, setStatusMessage] = useState('');
      const [searchQuery, setSearchQuery] = useState('');
      const [newBarName, setNewBarName] = useState('');
      const [newBarDesc, setNewBarDesc] = useState('');
      const [newBarCategory, setNewBarCategory] = useState('nightlife');
      const [exchangeAmount, setExchangeAmount] = useState('100');
      const [fromCurrency, setFromCurrency] = useState('ILS');
      const [toCurrency, setToCurrency] = useState('HUF');
      const [adminInput, setAdminInput] = useState('');

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) setUser(currentUser);
          else signInAnonymously(auth).catch(() => {});
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        const fetchRates = async () => {
          try {
            const res = await fetch('https://open.er-api.com/v6/latest/ILS');
            const data = await res.json();
            if (data?.rates) {
              setExchangeRates({ ILS: 1, HUF: data.rates.HUF, EUR: data.rates.EUR });
              setRatesStatus('מעודכן בחיבור חי 🟢');
            }
          } catch (e) { setRatesStatus('שער משוער (ללא קליטה) 🔴'); }
        };
        fetchRates();
      }, []);

      useEffect(() => {
        const checkTime = () => {
          const now = new Date().getTime();
          const distance = DEADLINE.getTime() - now;
          if (distance < 0) {
            setIsLocked(true);
            setTimeLeftStr('התחרות ננעלה!');
          } else {
            setIsLocked(false);
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            let timeString = '';
            if (days > 0) timeString += `${days} ימים, `;
            timeString += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            setTimeLeftStr(timeString);
          }
        };
        checkTime();
        const timer = setInterval(checkTime, 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        if (!user) return;
        const unsubCheck = onSnapshot(collection(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins'), snap => {
          setCheckins(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp));
        });
        const unsubBars = onSnapshot(collection(db, 'artifacts', databaseAppId, 'public', 'data', 'community_bars'), snap => {
          setCommunityBars(snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => b.timestamp - a.timestamp));
        });
        const unsubSetlist = onSnapshot(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'admin', 'setlist'), d => {
          if (d.exists()) setOfficialSetlist(d.data().list?.split(/[\r\n,]+/).map(s => s.trim().replace(/^\d+[\.\-)]\s*/, '')).filter(Boolean));
        });
        const unsubAllPreds = onSnapshot(collection(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions'), snap => {
          setAllPredictions(snap.docs.map(d => ({id: d.id, ...d.data()})));
        });
        return () => { unsubCheck(); unsubBars(); unsubSetlist(); unsubAllPreds(); };
      }, [user]);

      useEffect(() => {
        if (!user || user.isAnonymous) return;
        const predRef = doc(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions', user.uid);
        const unsub = onSnapshot(predRef, (docSnap) => {
          if (docSnap.exists() && docSnap.data().selected_songs) {
            setMyPrediction(docSnap.data().selected_songs);
          }
        });
        return () => unsub();
      }, [user]);

      const handleLogoClick = () => {
        const next = secretClicks + 1;
        setSecretClicks(next);
        if (next === 7) { setIsAdmin(true); setActiveTab('admin'); alert("מצב מנהל הופעל! 🤘"); }
      };

      const handleCheckIn = async () => {
        setIsSaving(true);
        try {
          await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid), {
            name: user.displayName || "אורח",
            photoURL: user.photoURL || "",
            zone: selectedZone, message: statusMessage, timestamp: Date.now(), userId: user.uid
          });
          setShowCheckInForm(false);
          setStatusMessage('');
        } catch(e) {}
        setIsSaving(false);
      };

      const handleSavePrediction = async () => {
        if (isLocked) { alert("התחרות ננעלה. לא ניתן לשמור ניחושים יותר."); return; }
        if (myPrediction.includes("")) { alert("יש לבחור בדיוק 16 שירים לפני השמירה."); return; }
        if (!user || user.isAnonymous) return;
        setIsSaving(true);
        try {
            await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions', user.uid), {
                name: user.displayName || "אורח", email: user.email || "", userId: user.uid,
                selected_songs: myPrediction, timestamp: Date.now()
            });
            alert("הניחוש שלך נשמר בהצלחה! 🤘");
        } catch (e) { alert("אירעה שגיאה בשמירת הניחוש."); }
        setIsSaving(false);
      };

      const handleDeletePrediction = async () => {
        if (isLocked) return;
        if (!window.confirm("בטוח שברצונך למחוק את הניחוש לצמיתות? פעולה זו תסיר אותך מהתחרות.")) return;
        if (!user || user.isAnonymous) { setMyPrediction(Array(16).fill("")); return; }
        setIsSaving(true);
        try {
            await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions', user.uid));
            setMyPrediction(Array(16).fill(""));
            alert("הניחוש נמחק לחלוטין מהמערכת! 🗑️");
        } catch (e) { alert("אירעה שגיאה במחיקת הניחוש."); }
        setIsSaving(false);
      };

      const handleAddCommunityBar = async () => {
        if (!user || user.isAnonymous) { alert("יש להתחבר כדי להוסיף המלצה."); return; }
        if (!newBarName.trim()) { alert("אנא הזן את שם המקום."); return; }
        setIsSaving(true);
        try {
          await addDoc(collection(db, 'artifacts', databaseAppId, 'public', 'data', 'community_bars'), {
            name: newBarName, desc: newBarDesc || "אין תיאור.", category: newBarCategory,
            addedBy: user.displayName || "אורח", userId: user.uid, timestamp: Date.now()
          });
          setNewBarName(''); setNewBarDesc(''); setNewBarCategory('nightlife');
          setShowAddBarForm(false);
        } catch (e) { alert("שגיאה בשמירת ההמלצה."); }
        setIsSaving(false);
      };

      const handleDeleteCommunityBar = async (barId) => {
        if (!window.confirm("בטוח שברצונך למחוק המלצה זו?")) return;
        try { await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'community_bars', barId)); } 
        catch(e) { alert("שגיאת הרשאות! לא ניתן למחוק את ההמלצה."); }
      };

      const handlePublishSetlist = async () => {
        if(!adminInput) return;
        await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'admin', 'setlist'), { list: adminInput, timestamp: Date.now() });
        setAdminInput('');
        alert("פורסם!");
      };

      const calculateCurrency = () => {
         const amt = parseFloat(exchangeAmount);
         if (isNaN(amt)) return '0';
         const res = (amt / exchangeRates[fromCurrency]) * exchangeRates[toCurrency];
         return toCurrency === 'HUF' ? Math.round(res).toLocaleString() : res.toFixed(2);
      };

      const leaderboard = useMemo(() => {
        if (!officialSetlist || allPredictions.length === 0) return [];
        return allPredictions.map(p => {
          let score = 0, exact = 0, partial = 0;
          p.selected_songs?.forEach((s, i) => {
            if (s === officialSetlist[i]) { score += 5; exact++; }
            else if (officialSetlist.includes(s)) { score += 2; partial++; }
          });
          return { ...p, score, exact, partial };
        }).sort((a,b) => b.score - a.score || b.exact - a.exact);
      }, [officialSetlist, allPredictions]);


      return (

                  <h2 className="text-lg font-bold mb-4 text-white">Seek & Locate - מי נמצא איפה?</h2>
                  {!user || user.isAnonymous ? (
                    <button onClick={() => signInWithPopup(auth, new GoogleAuthProvider())} className="w-full bg-white text-black font-bold py-3 rounded-xl flex justify-center items-center gap-2">
                      <img src="https://www.svgrepo.com/show/475656/google-color.svg" style={{width: '20px', height: '20px'}} alt="Google" /> Jump in the Fire (התחבר)
                    </button>
                  ) : (
                    <button onClick={() => setShowCheckInForm(true)} className="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">Hit the Lights (אני פה)</button>
                  )}
                </div>

                <div className="bg-green-950/80 border border-green-800/40 rounded-2xl p-5 shadow-lg">
                  <h3 className="font-bold text-white mb-3 flex items-center gap-2">
                    <i className="fa-brands fa-whatsapp text-green-500 text-xl"></i>
                    קבוצות הוואטסאפ של המשלחת
                  </h3>
                  <div className="flex flex-col gap-3">
                    <button onClick={() => window.open('https://chat.whatsapp.com/GaUcKFTWg2jACThpFUM6Iq', '_blank')} className="bg-[#25D366] hover:bg-[#1ebd57] text-black py-3 px-4 rounded-xl text-sm font-bold flex justify-between items-center transition shadow-md">
                      <span>הקבוצה הרשמית של המועדון</span>
                      <i className="fa-solid fa-arrow-up-right-from-square opacity-70"></i>
                    </button>
                    <button onClick={() => window.open('https://chat.whatsapp.com/Gw5h7ZSvmV0FcHUkdTzPUd', '_blank')} className="bg-[#25D366] hover:bg-[#1ebd57] text-black py-3 px-4 rounded-xl text-sm font-bold flex justify-between items-center transition shadow-md">
                      <span>קבוצת הנוסעים לבודפשט</span>
                      <i className="fa-solid fa-arrow-up-right-from-square opacity-70"></i>
                    </button>
                  </div>

                  <div className="mt-5 pt-4 border-t border-green-800/50">
                    <p className="text-xs text-green-400 mb-3 font-bold"><i className="fa-solid fa-user-shield ml-1"></i> צוות האדמינים (לכל שאלה):</p>
                    <div className="grid grid-cols-2 gap-2">
                      {ADMINS.map(admin => (
                        <a key={admin.name} href={`https://wa.me/${admin.wa}`} target="_blank" rel="noreferrer" className="bg-black/60 p-3 rounded-lg border border-green-900/50 flex items-center justify-center gap-2 hover:bg-black/80 transition">
                          <i className="fa-brands fa-whatsapp text-green-500 text-lg"></i>
                          <span className="text-xs text-white font-bold">{admin.name}</span>
                        </a>
                      ))}
                    </div>
                  </div>
                </div>

                {STADIUM_ZONES.map(zone => {
                  const items = checkins.filter(c => c.zone === zone);
                  if (items.length === 0) return null;
                  return (
                    <div key={zone} className="bg-black/60 border border-gray-800 rounded-xl overflow-hidden shadow-lg">
                      <div className="bg-gray-900/90 px-4 py-2 flex justify-between items-center font-bold text-blue-400 text-sm border-b border-gray-800">
                        <span>{zone}</span><span className="bg-blue-900/50 px-2 rounded-full text-xs text-blue-200">{items.length}</span>
                      </div>
                      {items.map(c => (
                        <div key={c.id} className="p-3 flex gap-3 items-center border-b border-gray-800/30">
                          <img src={c.photoURL || 'https://placehold.co/50/1e3a8a/fff?text=🤘'} style={{width: '32px', height: '32px', borderRadius: '50%'}} alt="Avatar" />
                          <div className="flex-1 text-sm">
                            <div className="flex justify-between font-bold text-white"><span>{c.name}</span><span className="text-[10px] text-gray-500">{timeAgo(c.timestamp)}</span></div>
                            {c.message && <p className="text-gray-400 text-xs mt-1">{c.message}</p>}
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
              </div>
            )}

            {activeTab === 'takeover' && (
              <div className="space-y-4 fade-in">
                <div className="bg-yellow-500/20 border border-yellow-500/40 rounded-xl p-4 text-center">
                  <h2 className="text-lg font-bold text-yellow-400">Metallica Takeover</h2>
                  <p className="text-xs text-yellow-100 opacity-80">לו"ז אירועים רשמי בעיר</p>
                </div>
                {TAKEOVER_EVENTS.map(ev => (
                  <div key={ev.id} className="bg-black/80 border border-gray-800 rounded-2xl p-4 flex items-center gap-4 shadow-xl">
                    <div className={`w-12 h-12 shrink-0 rounded-full bg-gray-900 flex items-center justify-center text-lg ${ev.color}`}><i className={ev.icon}></i></div>
                    <div className="flex-1">
                      <h3 className="font-bold text-white">{ev.name}</h3>
                      <p className="text-xs text-gray-400 whitespace-pre-line leading-relaxed">{ev.desc}</p>
                    </div>
                    <button onClick={() => window.open(getMapUrl(ev.lat, ev.lng), '_blank')} className="bg-blue-600 text-white w-10 h-10 shrink-0 rounded-xl flex items-center justify-center hover:bg-blue-500 transition"><i className="fa-solid fa-location-arrow"></i></button>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'currency' && (
              <div className="bg-black/80 border border-gray-800 rounded-2xl p-6 text-center shadow-2xl fade-in">
                <h2 className="text-xl font-bold mb-6 text-white">מחשבון המרה</h2>
                <div className="space-y-4 max-w-xs mx-auto">
                   <div className="flex gap-2">
                     <input 
                       type="number" 
                       value={exchangeAmount} 
                       onChange={(e) => setExchangeAmount(e.target.value)} 
                       className="flex-1 bg-gray-900 border border-gray-700 p-3 rounded-xl text-center text-xl font-bold text-white outline-none focus:border-blue-500" 
                     />
                     <select 
                       value={fromCurrency} 
                       onChange={(e) => setFromCurrency(e.target.value)} 
                       className="bg-gray-800 p-2 rounded-xl text-sm font-bold text-white outline-none"
                     >
                        <option value="ILS">₪</option>
                        <option value="HUF">Ft</option>
                        <option value="EUR">€</option>
                     </select>
                   </div>
                   
                   <div className="text-blue-400 text-4xl font-black py-4" dir="ltr">
                     {calculateCurrency()}
                   </div>
                   
                   <div className="flex gap-2 text-gray-400 justify-center items-center">
                     <span className="text-sm">למטבע:</span>
                     <select 
                       value={toCurrency} 
                       onChange={(e) => setToCurrency(e.target.value)} 
                       className="bg-transparent font-bold text-white outline-none"
                     >
                        <option value="HUF">Ft</option>
                        <option value="ILS">₪</option>
                        <option value="EUR">€</option>
                     </select>
                   </div>
                   <p className="text-[10px] text-gray-500 font-bold mt-4 pt-4 border-t border-gray-800">{ratesStatus}</p>
                </div>
              </div>
            )}
            
            {activeTab === 'bars' && (
              <div className="space-y-4 fade-in">
                <div className="bg-black/80 border border-gray-800 p-4 rounded-xl flex gap-2">
                   <input 
                     type="text" 
                     value={searchQuery}
                     onChange={(e) => setSearchQuery(e.target.value)}
                     placeholder="Wherever I May Roam (חיפוש)" 
                     className="flex-1 bg-gray-900 p-3 rounded-xl text-sm outline-none text-white focus:border-blue-500 border border-transparent" 
                   />
                   <button onClick={() => window.open(getMapSearchUrl(searchQuery + ' Budapest'), '_blank')} className="bg-blue-600 hover:bg-blue-500 px-4 rounded-xl text-white transition"><i className="fa-solid fa-search"></i></button>
                </div>
                
                <h2 className="text-xl font-bold text-white border-b border-gray-800 pb-2 pt-4">Whiskey in the Jar (איפה שותים?)</h2>
                  {CURATED_BARS.map(item => (
                    <div key={item.name} className="bg-black/80 border border-gray-800 rounded-2xl p-4 flex justify-between items-center shadow-lg">
                      <div className="flex-1 pl-2"><h4 className="font-bold text-white">{item.name}</h4><p className="text-xs text-gray-400 mt-1">{item.desc}</p></div>
                      <button onClick={() => window.open(getMapSearchUrl(item.name + ' Budapest'), '_blank')} className="text-red-500 bg-gray-800 hover:bg-gray-700 w-10 h-10 shrink-0 rounded-xl flex items-center justify-center transition"><i className="fa-solid fa-location-dot"></i></button>
                    </div>
                ))}

                <div className="flex justify-between items-center px-1 pt-6 border-t border-purple-900/50 mt-6">
                  <h2 className="font-bold text-purple-400">המלצות מהמשלחת</h2>
                  {(!user || user.isAnonymous) ? (
                    <button onClick={() => signInWithPopup(auth, new GoogleAuthProvider())} className="text-xs bg-gray-800 text-gray-300 px-3 py-1.5 rounded-lg border border-gray-700 text-white">התחבר כדי להמליץ</button>
                  ) : (
                    <button onClick={() => setShowAddBarForm(true)} className="bg-purple-600 hover:bg-purple-500 text-xs px-3 py-1.5 rounded-lg font-bold text-white transition">הוסף מקום <i className="fa-solid fa-plus ml-1"></i></button>
                  )}
                </div>

                {showAddBarForm && (
                  <div className="bg-purple-950/40 p-4 rounded-xl border border-purple-800/50">
                    <select value={newBarCategory} onChange={(e) => setNewBarCategory(e.target.value)} className="w-full bg-black/80 text-white border border-purple-800 rounded-xl p-3 mb-3 outline-none">
                      {Object.entries(POI_CATEGORIES).map(([k,v]) => <option key={k} value={k}>{v.label}</option>)}
                    </select>
                    <input type="text" value={newBarName} onChange={(e) => setNewBarName(e.target.value)} placeholder="שם המקום (חובה)" className="w-full bg-black/80 text-white border border-purple-800 rounded-xl p-3 mb-3 outline-none" />
                    <input type="text" value={newBarDesc} onChange={(e) => setNewBarDesc(e.target.value)} placeholder="תיאור קצר..." className="w-full bg-black/80 text-white border border-purple-800 rounded-xl p-3 mb-3 outline-none" />
                    <div className="flex gap-2">
                      <button onClick={handleAddCommunityBar} disabled={isSaving || !newBarName.trim()} className="flex-1 bg-purple-600 hover:bg-purple-500 py-3 rounded-xl font-bold text-white disabled:opacity-50 transition">שתף!</button>
                      <button onClick={() => setShowAddBarForm(false)} className="bg-gray-800 hover:bg-gray-700 px-4 rounded-xl text-gray-300 transition">ביטול</button>
                    </div>
                  </div>
                )}

                {communityBars.map(bar => {
                  const catInfo = POI_CATEGORIES[bar.category] || POI_CATEGORIES['other'];
                  const isOwnerOrAdmin = (user && user.uid === bar.userId) || isAdmin;
                  return (
                    <div key={bar.id} className="bg-black/80 border border-purple-900/40 p-4 rounded-2xl flex flex-col shadow-xl">
                      <div className="flex justify-between items-start mb-2">
                         <div className="flex-1 pl-2">
                           <div className="flex items-center gap-2 mb-1">
                             <h4 className="font-bold text-purple-100">{bar.name}</h4>
                             <span className={`text-[9px] px-2 py-0.5 rounded-md border ${catInfo.color}`}>{catInfo.label}</span>
                           </div>
                           <p className="text-xs text-gray-400 mb-2">{bar.desc}</p>
                         </div>
                         <div className="flex flex-col gap-2 shrink-0">
                           <button onClick={() => window.open(getMapSearchUrl(bar.name + ' Budapest'), '_blank')} className="text-purple-400 bg-gray-800 hover:bg-gray-700 w-10 h-10 rounded-xl flex items-center justify-center transition"><i className="fa-solid fa-location-dot"></i></button>
                           {isOwnerOrAdmin && (
                              <button onClick={() => handleDeleteCommunityBar(bar.id)} className="text-red-400 bg-red-900/20 hover:bg-red-900/40 border border-red-900/50 w-10 h-10 rounded-xl flex items-center justify-center transition"><i className="fa-solid fa-trash-can"></i></button>
                           )}
                         </div>
                      </div>
                      <div className="text-[10px] text-gray-500 border-t border-gray-800/50 pt-2 mt-1 flex justify-between">
                         <span><i className="fa-solid fa-user ml-1 opacity-50 text-purple-400"></i>ע"י <strong>{bar.addedBy}</strong></span>
                         <span>{timeAgo(bar.timestamp)}</span>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {activeTab === 'game' && (
              <div className="space-y-4 fade-in">
                {officialSetlist ? (
                  <div className="bg-yellow-900/30 border border-yellow-500/50 p-6 rounded-2xl text-center shadow-2xl">
                    <h2 className="text-2xl font-black text-yellow-500 italic">...AND JUSTICE FOR ALL</h2>
                    <p className="text-xs mb-6 text-gray-300">תוצאות האמת של המשלחת</p>
                    <div className="text-[10px] bg-black/60 p-2 rounded-lg text-gray-400 mb-4 border border-yellow-900/50">בול בפגיעה = 5 נק' | מיקום אחר = 2 נק'</div>
                    {leaderboard.map((u, i) => (
                      <div key={u.id} className={`flex items-center gap-3 p-3 mb-2 rounded-xl ${i===0 ? 'bg-yellow-500 text-black shadow-lg' : 'bg-black/60 border border-gray-800'}`}>
                         <span className="w-6 font-bold text-center">{i+1}</span>
                         <span className="flex-1 text-right font-bold truncate">{u.name}</span>
                         <span className="font-black text-lg">{u.score} <small className="text-[10px] opacity-70">PT</small></span>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="bg-purple-900/30 border border-purple-500/40 p-5 rounded-2xl shadow-xl">
                    <h2 className="text-xl font-bold mb-2 text-white">Master of the Setlist</h2>
                    <p className="text-xs text-gray-300 mb-4 italic">Build your own battery! נחשו את 16 השירים.</p>
                    
                    <div className={`mb-4 p-3 rounded-xl border text-center font-bold ${isLocked ? 'bg-red-900/80 border-red-500 text-red-200' : 'bg-purple-900/60 border-purple-500 text-purple-200'}`}>
                      {isLocked ? <><i className="fa-solid fa-lock"></i> התחרות ננעלה</> : <span dir="ltr">{timeLeftStr}</span>}
                    </div>

                    {(!user || user.isAnonymous) ? (
                      <button onClick={() => signInWithPopup(auth, new GoogleAuthProvider())} className="w-full bg-white text-black font-bold py-3 rounded-xl flex justify-center items-center gap-2 mb-4 hover:bg-gray-200 transition">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" style={{width: '20px', height: '20px'}} alt="G" /> התחבר כדי לשחק
                      </button>
                    ) : (
                      <div className="mb-4">
                        <div className="flex justify-between items-center mb-2 px-1">
                           <span className="text-xs font-bold text-purple-300">הבחירות שלך:</span>
                           {!isLocked && (
                             <button onClick={handleDeletePrediction} disabled={isSaving} className="text-[10px] bg-red-900/60 hover:bg-red-900/80 text-red-400 px-3 py-1.5 rounded-lg border border-red-800 transition text-white">
                               <i className="fa-solid fa-trash-can ml-1"></i> מחק הכל
                             </button>
                           )}
                        </div>
                        <div className="space-y-2 mb-6">
                           {myPrediction.map((s, i) => (
                             <div key={i} className="flex gap-3 items-center bg-black/60 p-2 rounded-xl border border-gray-800 shadow-inner">
                               <span className="w-6 h-6 flex items-center justify-center bg-gray-800 rounded-md text-[10px] text-gray-400 font-bold shrink-0">{i+1}</span>
                               <button onClick={() => !isLocked && setShowSongPicker(i)} disabled={isLocked} className={`flex-1 text-right text-sm py-2 px-3 rounded-lg truncate transition outline-none ${s ? 'text-white font-bold bg-blue-900/40 border border-blue-800/50' : 'text-gray-400 bg-gray-800 hover:bg-gray-700 border border-transparent'}`} dir="ltr">{s || 'Tap to select song...'}</button>
                             </div>
                           ))}
                        </div>
                        <button onClick={handleSavePrediction} disabled={isLocked || isSaving} className="w-full bg-purple-600 hover:bg-purple-500 text-white font-bold py-4 rounded-xl flex justify-center items-center gap-2 disabled:opacity-50 transition shadow-lg outline-none">
                          <i className="fa-solid fa-save"></i> So Let It Be Written!
                        </button>
                      </div>
                    )}
                    
                    <div className="mt-6 pt-4 border-t border-purple-900/50">
                       <h3 className="font-bold text-xs text-purple-300 mb-3"><i className="fa-solid fa-users ml-1"></i> {allPredictions.length} חברים רשומים:</h3>
                       <div className="flex flex-wrap gap-2">
                          {allPredictions.map(p => <span key={p.id} className="bg-black/80 text-white text-[10px] px-3 py-1.5 rounded-full border border-purple-900/40 flex items-center gap-1 shadow-sm"><i className="fa-solid fa-check text-green-500"></i> {p.name}</span>)}
                       </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </main>

          {/* Navigation מקובע למטה */}
          <nav className="h-[75px] bg-black/95 backdrop-blur-xl border-t border-gray-800 flex justify-around items-center px-2 z-50 shrink-0 pb-safe">
            {[
              { id: 'friends', icon: 'fa-street-view', label: 'רדאר' },
              { id: 'takeover', icon: 'fa-meteor', label: 'Takeover' },
              { id: 'game', icon: 'fa-clipboard-list', label: 'ניחושים', color: 'text-purple-400' },
              { id: 'currency', icon: 'fa-money-bill-transfer', label: 'המרה' },
              { id: 'bars', icon: 'fa-beer-mug-empty', label: 'בילויים' }
            ].map(tab => (
              <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center gap-1 transition-all flex-1 py-2 bg-transparent border-none outline-none ${activeTab === tab.id ? (tab.color || 'text-blue-400 scale-110') : 'text-gray-500 hover:text-gray-300'}`}>
                <i className={`fa-solid ${tab.icon} text-xl`}></i>
                <span className="text-[10px] font-bold">{tab.label}</span>
              </button>
            ))}
            {isAdmin && (
              <button onClick={() => setActiveTab('admin')} className={`flex flex-col items-center gap-1 flex-1 py-2 bg-transparent border-none outline-none ${activeTab === 'admin' ? 'text-red-400 scale-110' : 'text-red-900 hover:text-red-700'}`}>
                <i className="fa-solid fa-user-secret text-xl"></i><span className="text-[10px] font-bold">אדמין</span>
              </button>
            )}
          </nav>

          {/* מודאל עדכון מיקום */}
          {showCheckInForm && (
            <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-6 backdrop-blur-sm animate-in fade-in">
              <div className="bg-gray-900 w-full rounded-3xl p-6 border border-blue-900 shadow-2xl">
                <h3 className="text-xl font-bold mb-4 text-white">איפה אתה עכשיו?</h3>
                <select value={selectedZone} onChange={(e) => setSelectedZone(e.target.value)} className="w-full bg-black text-white border border-gray-700 p-4 rounded-xl mb-4 outline-none">
                  {STADIUM_ZONES.map(z => <option key={z} value={z}>{z}</option>)}
                </select>
                <input type="text" value={statusMessage} onChange={(e) => setStatusMessage(e.target.value)} placeholder="משהו לחברים?" className="w-full bg-black text-white border border-gray-700 p-4 rounded-xl mb-6 outline-none" />
                <div className="flex gap-3">
                  <button onClick={() => setShowCheckInForm(false)} className="flex-1 py-4 font-bold text-gray-400 bg-transparent border-none outline-none hover:text-white transition">ביטול</button>
                  <button onClick={handleCheckIn} disabled={isSaving} className="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-bold border-none outline-none hover:bg-blue-500 transition disabled:opacity-50">Strike Here! 🤘</button>
                </div>
              </div>
            </div>
          )}

          {/* מודאל בחירת שיר */}
          {showSongPicker !== null && (
            <div className="fixed inset-0 bg-black z-[110] flex flex-col p-4 pt-8 animate-in slide-in-from-bottom">
               <div className="flex justify-between items-center mb-4">
                 <h3 className="text-xl font-bold text-white">Choose Song #{showSongPicker+1}</h3>
                 <button onClick={() => {setShowSongPicker(null); setSongSearchLocal('');}} className="w-10 h-10 bg-gray-800 hover:bg-gray-700 text-white rounded-full border-none outline-none transition"><i className="fa-solid fa-times"></i></button>
               </div>
               <input type="text" placeholder="Search..." value={songSearchLocal} onChange={e => setSongSearchLocal(e.target.value)} className="w-full bg-gray-900 text-white p-4 rounded-xl mb-4 border border-purple-900/50 outline-none focus:border-purple-500 transition" dir="ltr" />
               <div className="flex-1 overflow-y-auto space-y-6 pb-20 scrollbar-hide">
                 {METALLICA_ALBUMS.map(album => {
                   const filtered = album.songs.filter(s => s.toLowerCase().includes(songSearchLocal.toLowerCase()));
                   if(filtered.length === 0) return null;
                   return (
                     <div key={album.title}>
                       <h4 className="text-xs font-black text-purple-500 uppercase tracking-widest mb-3 border-b border-purple-900/30 pb-1" dir="ltr">{album.title}</h4>
                       <div className="grid grid-cols-1 gap-2">
                         {filtered.map(song => {
                           const isSelected = myPrediction.includes(song);
                           return (
                             <button key={song} disabled={isSelected} onClick={() => {
                               const next = [...myPrediction];
                               next[showSongPicker] = song;
                               setMyPrediction(next);
                               setShowSongPicker(null);
                               setSongSearchLocal('');
                             }} className={`text-left p-4 rounded-xl text-sm transition-colors border outline-none ${isSelected ? 'bg-gray-800 border-gray-700 text-gray-600 opacity-50' : 'bg-gray-900/80 border-transparent text-white hover:bg-purple-900/40'}`} dir="ltr">
                               {song} {isSelected && <i className="fa-solid fa-check text-green-500 float-right mt-0.5"></i>}
                             </button>
                           );
                         })}
                       </div>
                     </div>
                   );
                 })}
               </div>
            </div>
          )}

          {/* אזור אדמין */}
          {activeTab === 'admin' && isAdmin && (
            <div className="fixed inset-0 bg-black/95 z-[100] p-6 flex flex-col justify-center animate-in fade-in">
                <div className="bg-red-900/30 border border-red-500/50 rounded-3xl p-6 shadow-2xl text-center">
                  <h2 className="text-2xl font-bold text-red-400 mb-2">פאנל מנהלים סודי</h2>
                  <p className="text-xs text-gray-300 mb-6">הדבק כאן את הסטליסט האמיתי (טקסט חופשי). המערכת תנקה את המספרים ותפרסם לכולם!</p>
                  <textarea value={adminInput} onChange={(e) => setAdminInput(e.target.value)} className="w-full h-48 bg-black/80 border border-red-800 rounded-xl p-4 text-white mb-6 outline-none focus:border-red-500 transition" dir="ltr" placeholder="1. Creeping Death..."></textarea>
                  <div className="flex gap-3">
                    <button onClick={handlePublishSetlist} disabled={!adminInput.trim() || isSaving} className="flex-[2] bg-red-600 hover:bg-red-500 text-white font-bold py-4 rounded-xl border-none outline-none transition disabled:opacity-50">פרסם תוצאות</button>
                    <button onClick={() => setActiveTab('friends')} className="flex-1 bg-gray-800 hover:bg-gray-700 text-white px-4 rounded-xl border-none outline-none transition">סגור</button>
                  </div>
                </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
