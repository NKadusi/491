    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'עכשיו';
      const minutes = Math.floor(seconds / 60);
      return minutes < 60 ? `לפני ${minutes} דק'` : `לפני ${Math.floor(minutes/60)} שע'`;
    }

    function formatWhatsAppNumber(phone) {
      let cleaned = phone.replace(/\D/g, ''); 
      if (cleaned.startsWith('05')) {
        cleaned = '972' + cleaned.substring(1);
      } else if (cleaned.startsWith('5')) {
        cleaned = '972' + cleaned;
      }
      return cleaned;
    }

    const getGoogleCalUrl = (event) => {
      if (event.customCalLink) return event.customCalLink;
      const text = encodeURIComponent(event.name);
      const details = encodeURIComponent(event.desc);
      const loc = encodeURIComponent(`${event.lat},${event.lng}`);
      return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${text}&details=${details}&location=${loc}`;
    };

    // יצירת קובץ ICS להוספה ליומן אפל (אייפון)
    const getAppleCalUrl = (event) => {
      const ics = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "BEGIN:VEVENT",
        `SUMMARY:${event.name}`,
        `DESCRIPTION:${event.desc.replace(/\n/g, ' ')}`,
        `LOCATION:${event.lat},${event.lng}`,
        "END:VEVENT",
        "END:VCALENDAR"
      ].join("\n");
      return `data:text/calendar;charset=utf8,${encodeURIComponent(ics)}`;
    };

      }, []);

      useEffect(() => {
        const fetchRates = async () => {
          try {
            const res = await fetch('https://open.er-api.com/v6/latest/ILS');
            const data = await res.json();
            if (data && data.rates) {
              setExchangeRates({
                ILS: 1,
                HUF: data.rates.HUF,
                EUR: data.rates.EUR
              });
              setRatesStatus('מעודכן בחיבור חי (Live) 🟢');
            }
          } catch (e) {
            console.warn("Failed to fetch rates:", e);
            setRatesStatus('שער משוער (ללא קליטה) 🔴');
          }
        };
        fetchRates();
      }, []);

      useEffect(() => {
        const checkTime = () => {
          const now = new Date().getTime();
          const distance = DEADLINE.getTime() - now;
          if (distance < 0) {
            setIsLocked(true);
            setTimeLeftStr('התחרות ננעלה!');
          } else {
            setIsLocked(false);
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            let timeString = '';
            if (days > 0) timeString += `${days} ימים, `;
            timeString += `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            setTimeLeftStr(timeString);
          }
        };
        checkTime();
        const timer = setInterval(checkTime, 1000);
        return () => clearInterval(timer);
      }, []);

      // שליפת מיקומי אצטדיון
      useEffect(() => {
        if (!user || !db) return;
        const checkinsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins');
        return onSnapshot(checkinsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setCheckins(data.sort((a, b) => b.timestamp - a.timestamp));
        });
      }, [user]);

      // משיכת אישורי הגעה לאירועי Takeover
      useEffect(() => {
        if (!db) return;
        const rsvpsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'takeover_rsvps');
        return onSnapshot(rsvpsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setTakeoverRsvps(data);
        });
      }, []);

      useEffect(() => {
        if (!user || !checkins.length || !db) return;
        const own = checkins.find(c => c.id === user.uid);
        if (!own || !own.zone) return;
        const migrated = migrateZone(own.zone);
        if (migrated !== own.zone) {
          setDoc(
            doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid),
            { ...own, zone: migrated },
            { merge: true }
          ).catch(err => console.warn('Zone migration failed:', err));
        }
      }, [user, checkins]);

      useEffect(() => {
        if (!db) return;
        const barsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'community_bars');
        return onSnapshot(barsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setCommunityBars(data.sort((a, b) => b.timestamp - a.timestamp));
        });
      }, []);

      useEffect(() => {
        if (!db) return;
        const ticketsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'tickets');
        return onSnapshot(ticketsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setTickets(data.sort((a, b) => b.timestamp - a.timestamp));
        });
      }, []);

      useEffect(() => {
        if (!user || user.isAnonymous || !db) return;
        const predRef = doc(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions', user.uid);
        return onSnapshot(predRef, (docSnap) => {
          if (docSnap.exists() && docSnap.data().selected_songs) {
            setMyPrediction(docSnap.data().selected_songs);
          }
        });
      }, [user]);

      useEffect(() => {
        if (!db) return;
        const setlistRef = doc(db, 'artifacts', databaseAppId, 'public', 'data', 'admin', 'setlist');
        return onSnapshot(setlistRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            if (data.list && typeof data.list === 'string') {
               const parsedSongs = data.list.split(/[\r\n,]+/).map(s => s.trim().replace(/^\d+[\.\-)]\s*/, '')).filter(Boolean);
               setOfficialSetlist(parsedSongs);
            } else if (data.songs && Array.isArray(data.songs)) {
               setOfficialSetlist(data.songs);
            } else {
               setOfficialSetlist(null);
            }
          } else {
            setOfficialSetlist(null);
          }
        });
      }, []);

      useEffect(() => {
        if (!db) return;
        const predsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions');
        return onSnapshot(predsRef, (snapshot) => {
           const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
           setAllPredictions(data);
        });
      }, []);

      const leaderboard = useMemo(() => {
        if (!officialSetlist || allPredictions.length === 0) return [];
        return allPredictions.map(pred => {
          let score = 0;
          let exactMatches = 0;
          let partialMatches = 0;
          const userSongs = pred.selected_songs || [];
          userSongs.forEach((song, idx) => {
            if (!song) return;
            if (song === officialSetlist[idx]) {
              score += 5;
              exactMatches += 1;
            } else if (officialSetlist.includes(song)) {
              score += 2;
              partialMatches += 1;
            }
          });
          return { ...pred, score, exactMatches, partialMatches };
        }).sort((a, b) => b.score - a.score || b.exactMatches - a.exactMatches);
      }, [officialSetlist, allPredictions]);

      const myCheckin = useMemo(() => {
        if (!user) return null;
        return checkins.find(c => c.id === user.uid) || null;
      }, [checkins, user]);

      const handleGoogleLogin = async () => {
        setErrorMsg('');
        if (isWhatsAppOrInApp) {
            setErrorMsg('שגיאה: אי אפשר להתחבר מתוך וואטסאפ! פתח בדפדפן רגיל.');
            return;
        }
        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
        } catch (error) {
            setErrorMsg(`ההתחברות נכשלה. וודא שאתה בדפדפן רגיל.`);
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        window.location.reload(); 
      };

      const handleLogoClick = () => {
        setSecretClicks(prev => {
          const next = prev + 1;
          if (next === 7) {
            setIsAdmin(true);
            setActiveTab('admin');
            alert("ברוך הבא למצב מנהל! 🤘");
          }
          return next;
        });
      };

      const handlePublishSetlist = async () => {
        if (!adminInput.trim() || !user || !db) return;
        setIsSaving(true);
        try {
          await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'admin', 'setlist'), {
            list: adminInput,
            timestamp: Date.now()
          });
          alert("הסטליסט פורסם בהצלחה! טבלת המובילים התעדכנה לכולם.");
          setAdminInput('');
        } catch (e) {
          console.error(e);
          alert("שגיאת הרשאות! ודא שעדכנת את ה-Firebase Rules עם כתובת האימייל שלך.");
        }
        setIsSaving(false);
      };

      // פונקציית אישורי הגעה לאירועי Takeover (RSVP)
      const handleToggleRsvp = async (eventId) => {
        if (!user || user.isAnonymous || !db) {
          alert("יש להתחבר כדי לסמן הגעה.");
          return;
        }
        
        const docId = `${eventId}_${user.uid}`;
        const docRef = doc(db, 'artifacts', databaseAppId, 'public', 'data', 'takeover_rsvps', docId);
        
        const isGoing = takeoverRsvps.some(r => r.id === docId);
        setIsSaving(true);
        
        try {
          if (isGoing) {
            await deleteDoc(docRef);
          } else {
            await setDoc(docRef, {
              eventId,
              userId: user.uid,
              name: user.displayName || "אורח",
              timestamp: Date.now()
            });
          }
        } catch (e) {
          console.error(e);
          alert("שגיאה בשמירת האישור. אנא נסה שוב.");
        }
        
        setIsSaving(false);
      };

      const handleCheckIn = async () => {
        if (!user || !db) return;
        setIsSaving(true);
        try {
            await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid), {
                name: user.isAnonymous ? "אורח" : user.displayName,
                photoURL: user.photoURL || "",
                zone: selectedZone,
                message: statusMessage,
                timestamp: Date.now(),
                userId: user.uid
            });
            setShowCheckInForm(false);
            setStatusMessage('');
        } catch (e) { console.error(e); }
        setIsSaving(false);
      };

      const handleDeleteLocation = async () => {
        if (!user || !db) return;
        setIsSaving(true);
        try {
            await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid));
            setShowCheckInForm(false);
            setStatusMessage('');
        } catch (e) { console.error(e); }
        setIsSaving(false);
      };

      const handleAddCommunityBar = async () => {
        if (!user || user.isAnonymous || !db) {
          alert("יש להתחבר כדי להוסיף המלצה.");
          return;
        }
        if (!newBarName.trim()) {
          alert("אנא הזן את שם המקום.");
          return;
        }
        setIsSaving(true);
        try {
          await addDoc(collection(db, 'artifacts', databaseAppId, 'public', 'data', 'community_bars'), {
            name: newBarName,
            desc: newBarDesc || "אין תיאור.",
            category: newBarCategory,
            addedBy: user.displayName || "אורח",
            userId: user.uid,
            timestamp: Date.now()
          });
          setNewBarName('');
          setNewBarDesc('');
          setNewBarCategory('nightlife');
          setShowAddBarForm(false);
        } catch (e) {
          console.error(e);
          alert("שגיאה בשמירת ההמלצה. ודא שעדכנת את חוקי האבטחה (Rules) בשרת.");
        }
        setIsSaving(false);
      };

      const handleDeleteCommunityBar = async (barId) => {
        if (!window.confirm("בטוח שברצונך למחוק המלצה זו?")) return;
        if (!db) return;
        try {
          await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'community_bars', barId));
        } catch(e) {
          console.error(e);
          alert("שגיאת הרשאות! לא ניתן למחוק את ההמלצה.");
        }
      };

      const handleAddTicket = async () => {
        if (!user || user.isAnonymous || !db) {
          alert("יש להתחבר כדי לפרסם כרטיסים.");
          return;
        }
        if (!ticketPrice.trim() || !ticketPhone.trim()) {
          alert("אנא ספק מחיר ומספר טלפון כדי שיוכלו ליצור איתך קשר.");
          return;
        }
        setIsSaving(true);
        try {
          await addDoc(collection(db, 'artifacts', databaseAppId, 'public', 'data', 'tickets'), {
            show: ticketShow,
            type: ticketType,
            qty: ticketQty,
            price: ticketPrice,
            phone: formatWhatsAppNumber(ticketPhone),
            desc: ticketDesc || "",
            sellerName: user.displayName || "אורח",
            userId: user.uid,
            timestamp: Date.now()
          });
          setTicketPrice('');
          setTicketPhone('');
          setTicketDesc('');
          setShowTicketForm(false);
        } catch (e) {
          console.error(e);
          alert("שגיאה בפרסום הכרטיס. ודא שחוקי האבטחה מעודכנים.");
        }
        setIsSaving(false);
      };

      const handleDeleteTicket = async (ticketId) => {
        if (!window.confirm("למחוק את המודעה?")) return;
        if (!db) return;
        try {
          await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'tickets', ticketId));
        } catch(e) {
          console.error(e);
          alert("שגיאת הרשאות!");
        }
      };

      const handleSavePrediction = async () => {
        if (isLocked) {
            setErrorMsg("התחרות ננעלה. לא ניתן לשמור ניחושים יותר.");
            return;
        }
        if (myPrediction.includes("")) {
            setErrorMsg("יש לבחור בדיוק 16 שירים לפני השמירה.");
            return;
        }
        if (!user || user.isAnonymous || !db) return;

        setIsSaving(true);
        setErrorMsg('');
        setSaveSuccessMsg('');
        try {
            await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions', user.uid), {
                name: user.displayName || "אורח",
                email: user.email || "",
                userId: user.uid,
                selected_songs: myPrediction,
                timestamp: Date.now()
            });
            setSaveSuccessMsg("הניחוש שלך נשמר בהצלחה! 🤘");
            setTimeout(() => setSaveSuccessMsg(''), 4000);
        } catch (e) { 
            console.error(e);
            if (e.code === 'permission-denied') {
                setErrorMsg("שגיאת הרשאה: ייתכן שהתחרות ננעלה בשרת ולא ניתן לעדכן.");
            } else {
                setErrorMsg("אירעה שגיאה בשמירת הניחוש.");
            }
        }
        setIsSaving(false);
      };

      const handleDeletePrediction = async () => {
        if (isLocked) return;
        if (!window.confirm("בטוח שברצונך למחוק את הניחוש לצמיתות? פעולה זו תסיר אותך מהתחרות.")) return;

        if (!user || user.isAnonymous || !db) {
            setMyPrediction(Array(16).fill(""));
            return;
        }

        setIsSaving(true);
        setErrorMsg('');
        setSaveSuccessMsg('');
        try {
            await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'predictions', user.uid));
            setMyPrediction(Array(16).fill(""));
            setSaveSuccessMsg("הניחוש נמחק לחלוטין מהמערכת! 🗑️");
            setTimeout(() => setSaveSuccessMsg(''), 4000);
        } catch (e) { 
            console.error(e);
            setErrorMsg("אירעה שגיאה במחיקת הניחוש.");
        }
        setIsSaving(false);
      };

      const convertCurrency = () => {
          const amt = parseFloat(exchangeAmount);
          if (isNaN(amt)) return '0';
          const result = (amt / exchangeRates[fromCurrency]) * exchangeRates[toCurrency];
          return toCurrency === 'HUF' ? Math.round(result).toLocaleString() : result.toFixed(2);
      };

      const checkinsByZone = useMemo(() => {
        const grouped = {};
        STADIUM_ZONES.forEach(z => grouped[z] = []);
        checkins.forEach(c => {
          const migrated = migrateZone(c.zone);
          if (grouped[migrated]) grouped[migrated].push(c);
        });
        return grouped;
      }, [checkins]);

      if (!firebaseReady) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-black text-white">
            <div className="text-center">
              <i className="fa-solid fa-bolt text-blue-500 text-4xl mb-4 block animate-pulse"></i>
              <p className="text-lg font-bold">טוען את האפליקציה...</p>
            </div>
          </div>
        );
      }

      return (
        <ErrorBoundary>
          <div className="min-h-screen flex flex-col relative pb-safe max-w-lg mx-auto shadow-2xl overflow-x-hidden">

            {isWhatsAppOrInApp && (
              <div className="bg-red-600 text-white p-3 text-center text-sm font-bold z-[100] sticky top-0 shadow-lg">
                  ⚠️ פתח ב-Chrome/Safari כדי להתחבר לחשבון!
              </div>
            )}

            {/* --- תפריט צד (המבורגר) --- */}
            <div className={`fixed inset-0 z-[100] transition-opacity duration-300 ${menuOpen ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'}`}>
              <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={() => setMenuOpen(false)}></div>
              <div className={`absolute inset-y-0 right-0 w-72 bg-gray-900 border-l border-gray-800 shadow-2xl transform transition-transform duration-300 ease-out flex flex-col ${menuOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                <div className="p-5 border-b border-gray-800 flex items-center justify-between bg-black/40">
                  <div className="flex items-center gap-3">
                    <img src="./logo.jpg" className="w-10 h-10 rounded-full border border-blue-400" alt="Logo" />
                    <span className="font-bold text-white tracking-wider">תפריט ניווט</span>
                  </div>
                  <button onClick={() => setMenuOpen(false)} className="text-gray-400 hover:text-white text-xl p-2 active:scale-90">
                    <i className="fa-solid fa-times"></i>
                  </button>
                </div>
                
                <div className="flex-1 overflow-y-auto py-2">
                  {/* Account Section inside menu */}
                  {user && !user.isAnonymous && (
                    <div className="px-6 py-4 border-b border-gray-800 mb-2">
                      <p className="text-white font-bold text-sm truncate">{user.displayName}</p>
                      <p className="text-gray-400 text-xs truncate">{user.email}</p>
                    </div>
                  )}
                  
                  {/* Navigation Tabs */}
                  {MENU_TABS.map(tab => (
                    <button
                      key={tab.id}
                      onClick={() => { setActiveTab(tab.id); setMenuOpen(false); }}
                      className={`w-full flex items-center gap-4 px-6 py-4 transition-colors ${
                        activeTab === tab.id ? 'bg-blue-900/30 border-r-4 border-blue-500 text-blue-300' : 'text-gray-300 hover:bg-gray-800 border-r-4 border-transparent'
                      }`}
                    >
                      <div className="w-6 text-center text-lg">
                        <i className={`fa-solid ${tab.icon}`}></i>
                      </div>
                      <span className="font-bold text-[15px]">{tab.label}</span>
                    </button>
                  ))}

                  {/* Admin Tab */}
                  {isAdmin && (
                    <div className="mt-4 pt-4 border-t border-gray-800">
                      <button
                        onClick={() => { setActiveTab('admin'); setMenuOpen(false); }}
                        className={`w-full flex items-center gap-4 px-6 py-4 transition-colors ${
                          activeTab === 'admin' ? 'bg-red-900/30 border-r-4 border-red-500 text-red-300' : 'text-red-400 hover:bg-gray-800 border-r-4 border-transparent'
                        }`}
                      >
                        <div className="w-6 text-center text-lg"><i className="fa-solid fa-user-secret"></i></div>
                        <span className="font-bold text-[15px]">פאנל מנהלים סודי</span>
                      </button>
                    </div>
                  )}

                  {/* Logout Button */}
                  {user && !user.isAnonymous && (
                    <div className="mt-4 pt-4 border-t border-gray-800">
                      <button
                        onClick={() => { handleLogout(); setMenuOpen(false); }}
                        className="w-full flex items-center gap-4 px-6 py-4 transition-colors text-gray-400 hover:bg-gray-800 hover:text-red-400 border-r-4 border-transparent"
                      >
                        <div className="w-6 text-center text-lg"><i className="fa-solid fa-right-from-bracket"></i></div>
                        <span className="font-bold text-[15px]">התנתק מהחשבון</span>
                      </button>
                    </div>
                  )}
                </div>
                
                <div className="border-t border-gray-800 p-4 text-center bg-black/40">
                  <p className="text-[10px] text-gray-500">
                    <i className="fa-solid fa-bolt text-blue-500 mr-1"></i>
                    Chapter 491 · Budapest 2026
                  </p>
                </div>
              </div>
            </div>

            <header className="bg-gradient-to-b from-blue-900/90 to-black backdrop-blur-md border-b border-blue-900 p-4 sticky top-0 z-40">
              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3 overflow-hidden">
                  <button onClick={() => setMenuOpen(true)} className="text-white text-2xl pr-1 pl-3 active:scale-90 transition outline-none">
                    <i className="fa-solid fa-bars"></i>
                  </button>
                  <img 
                    src="./logo.jpg" 
                    onClick={handleLogoClick}
                    className="w-10 h-10 rounded-full border-2 border-blue-400 object-cover lightning-glow cursor-pointer shrink-0" 
                    alt="Logo"
                    onError={(e) => { e.target.style.display='none'; }}
                  />
                  <div dir="ltr" className="text-left flex-1 overflow-hidden">
                    <h1 className="text-[13px] xs:text-[14px] sm:text-base font-bold text-white tracking-wider whitespace-nowrap">
                      CHAPTER 491 GOES TO <span className="text-red-500">BUD</span><span className="text-white">AP</span><span className="text-green-500">EST</span>
                    </h1>
                  </div>
                </div>
                {!user?.isAnonymous && user && (
                  <button onClick={handleLogout} className="text-blue-300 p-2 hover:text-white transition shrink-0"><i className="fa-solid fa-right-from-bracket text-xl"></i></button>
                )}
              </div>
            </header>

            <main className="p-4 flex-1 relative z-10 overflow-y-auto">
              {activeTab === 'friends' && (
                <div className="text-center py-8 text-gray-300">
                  <p>טוען תכניות...</p>
                </div>
              )}
            </main>
          </div>
        </ErrorBoundary>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
