```html
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chapter 491 Goes to Budapest</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      background-color: #0a0a0a;
      background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)), url('https://images.unsplash.com/photo-1598387181032-a3103a2db5b3?auto=format&fit=crop&q=80&w=1000');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
    }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 100px) !important; }
    .lightning-glow { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.9)); }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-neutral-200 min-h-screen">
  
  <!-- לוכד שגיאות קריטי ברמת הדפדפן -->
  <div id="startup-error" style="display:none; color:white; background:#ef4444; padding:20px; text-align:center; direction:rtl; font-weight:bold; z-index:9999; position:fixed; top:0; left:0; right:0;">
    שגיאת מערכת חמורה: אנא נקה את מטמון הדפדפן ורענן את העמוד.
  </div>

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, Component } = React;

    // --- Error Boundary (לוכד שגיאות ריאקט) ---
    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 text-center bg-red-900/90 text-white min-h-screen flex flex-col justify-center items-center">
              <i className="fa-solid fa-triangle-exclamation text-5xl mb-4 text-red-400"></i>
              <h1 className="text-2xl font-bold mb-2">משהו השתבש בתצוגה</h1>
              <p className="text-sm text-red-200 mb-6" dir="ltr">{this.state.error.message}</p>
              <button onClick={() => window.location.reload()} className="bg-white text-red-900 font-bold px-6 py-3 rounded-xl shadow-lg">רענן את האפליקציה</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // --- הגדרות פיירבייס המקוריות שלך ---
    const firebaseConfig = {
      apiKey: "AIzaSyC7EreIS4PMeQtPEsQu35y2_UlcNl3c8VI",
      authDomain: "goes-to-budapest.firebaseapp.com",
      projectId: "goes-to-budapest",
      storageBucket: "goes-to-budapest.firebasestorage.app",
      messagingSenderId: "488923007392",
      appId: "1:488923007392:web:8b657382aab11109a2bcc5",
      measurementId: "G-4QXV4Q37KH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const databaseAppId = 'metallica-budapest-app';

    // --- נתונים קבועים ---
    const STADIUM_ZONES = ["Snake Pit", "פלטפורמה", "דשא צמוד לבמה", "דשא עמידה (GA)", "יציע 100", "יציע 200", "יציע 300", "מתחם אוכל", "בדרך לאצטדיון"];

    const PLACES = [
      { id: 'hotel', name: 'Mövenpick Hotel Budapest Centre', type: 'hotel', lat: 47.5023, lng: 19.0531, desc: 'בסיס האם של המשלחת', icon: 'fa-solid fa-hotel', color: 'text-yellow-400' },
      { id: 'stadium', name: 'אצטדיון פושקש', type: 'stadium', lat: 47.5030, lng: 19.0980, desc: 'כאן קורה הקסם (מטרו M2)', icon: 'fa-solid fa-bolt', color: 'text-blue-400' },
      { id: 'bls', name: 'מועדון Barba Negra', type: 'concert', lat: 47.4526, lng: 19.0594, desc: 'הופעת BLS ב-10.6', icon: 'fa-solid fa-guitar', color: 'text-orange-500' },
      { id: 'popup', name: 'חנות פופ-אפ מטאליקה', type: 'store', lat: 47.4975, lng: 19.0550, desc: 'מרצ\'נדייז רשמי', icon: 'fa-solid fa-bag-shopping', color: 'text-white' }
    ];

    const CURATED_BARS = [
      { name: 'Szimpla Kert', desc: 'ה-Ruin Bar המפורסם בעולם. חובה.' },
      { name: 'Instant-Fogas', desc: 'קומפלקס מסיבות ענק ופרוע.' },
      { name: 'Liquid Rock', desc: 'בר רוק מעולה לחברים בלב העיר.' }
    ];

    // --- Helpers ---
    function calculateDistanceDetailed(lat1, lon1, lat2, lon2) {
      if (!lat1 || !lon1 || !lat2 || !lon2) return null;
      const R = 6371; 
      const dLat = (lat2 - lat1) * (Math.PI/180);
      const dLon = (lon2 - lon1) * (Math.PI/180); 
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      const distKm = R * c; 
      if (distKm < 1) return `${Math.round(distKm * 1000)} מטר ממך`;
      return `${distKm.toFixed(1)} ק"מ ממך`;
    }

    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'עכשיו';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `לפני ${minutes} דק'`;
      return `לפני ${Math.floor(minutes/60)} שעות`;
    }

    function App() {
      const [activeTab, setActiveTab] = useState('friends');
      const [user, setUser] = useState(null);
      const [checkins, setCheckins] = useState([]);
      const [selectedZone, setSelectedZone] = useState(STADIUM_ZONES[0]);
      const [statusMessage, setStatusMessage] = useState('');
      const [useGps, setUseGps] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [showCheckInForm, setShowCheckInForm] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [myLocation, setMyLocation] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');

      // Currency State
      const [exchangeAmount, setExchangeAmount] = useState('100');
      const [fromCurrency, setFromCurrency] = useState('ILS');
      const [toCurrency, setToCurrency] = useState('HUF');

      useEffect(() => {
        const initAuth = async () => {
          try {
            const result = await getRedirectResult(auth);
            if (result && result.user) { 
                setUser(result.user); 
                return; 
            }
          } catch (e) { 
              console.error("Auth redirect error:", e); 
          }

          onAuthStateChanged(auth, (currentUser) => {
            if (currentUser) {
                setUser(currentUser);
            } else {
                signInAnonymously(auth).catch(err => console.log("Anonymous login skipped/failed", err));
            }
          });
        };
        initAuth();
      }, []);

      useEffect(() => {
        if (!user) return;
        const checkinsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins');
        const unsubscribe = onSnapshot(checkinsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setCheckins(data.sort((a, b) => b.timestamp - a.timestamp));
        }, (error) => {
            console.error("Firestore read error:", error);
        });
        return () => unsubscribe();
      }, [user]);

      useEffect(() => {
        if (useGps && navigator.geolocation) {
          const watchId = navigator.geolocation.watchPosition(
            (pos) => setMyLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            null, { enableHighAccuracy: true }
          );
          return () => navigator.geolocation.clearWatch(watchId);
        }
      }, [useGps]);

      const handleGoogleLogin = () => {
        setErrorMsg('מעביר להתחברות...');
        signInWithRedirect(auth, new GoogleAuthProvider());
      };

      const handleCheckIn = async () => {
        if (!user) return;
        setIsSaving(true);
        let gps = null;
        if (useGps) {
          try {
            const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej));
            gps = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          } catch (e) {}
        }
        try {
            await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid), {
                name: user.isAnonymous ? "אורח" : user.displayName,
                photoURL: user.photoURL || "",
                zone: selectedZone,
                message: statusMessage,
                timestamp: Date.now(),
                userId: user.uid,
                location: gps
            });
            setShowCheckInForm(false);
            setStatusMessage('');
        } catch (error) {
            console.error("Error saving checkin:", error);
        }
        setIsSaving(false);
      };

      const convertCurrency = () => {
          const rates = { EUR: 1, ILS: 4.0, HUF: 395 };
          const amt = parseFloat(exchangeAmount);
          if (isNaN(amt)) return '0';
          const baseEur = amt / rates[fromCurrency];
          const result = baseEur * rates[toCurrency];
          return toCurrency === 'HUF' ? Math.round(result).toLocaleString() : result.toFixed(2);
      };

      const checkinsByZone = useMemo(() => {
        const grouped = {};
        STADIUM_ZONES.forEach(z => grouped[z] = []);
        checkins.forEach(c => { 
            if(grouped[c.zone]) grouped[c.zone].push(c); 
            else grouped[c.zone] = [c]; 
        });
        return grouped;
      }, [checkins]);

      return (
        <div className="min-h-screen flex flex-col relative pb-safe max-w-lg mx-auto shadow-2xl">
          
          {/* Header */}
          <header className="bg-gradient-to-b from-blue-900/90 to-black backdrop-blur-md border-b border-blue-900 p-4 sticky top-0 z-50">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <img 
                  src="./logo.jpg" 
                  onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/100x100/1e3a8a/ffffff?text=M"; }}
                  className="w-12 h-12 rounded-full border-2 border-blue-400 object-cover lightning-glow" 
                  alt="Logo"
                />
                <div>
                  <h1 className="text-lg font-bold text-white tracking-wider">CHAPTER 491 <span className="text-blue-400">BUDAPEST</span></h1>
                  <p className="text-[11px] text-blue-200"><i className="fa-solid fa-bolt text-yellow-400 mr-1"></i> ראדאר משלחת חי</p>
                </div>
              </div>
              {!user?.isAnonymous && user && (
                <button onClick={() => signOut(auth)} className="text-blue-300 hover:text-white p-2"><i className="fa-solid fa-right-from-bracket text-xl"></i></button>
              )}
            </div>
          </header>

          <main className="p-4 flex-1 w-full relative z-10">
            
            {/* RADAR TAB */}
            {activeTab === 'friends' && (
              <div className="space-y-5 animate-in fade-in">
                <div className="bg-black/60 border border-blue-900/50 rounded-2xl p-6 shadow-xl backdrop-blur-sm">
                  {user?.isAnonymous || !user ? (
                    <div className="text-center space-y-4">
                      <div className="w-16 h-16 mx-auto bg-blue-900/40 rounded-full flex items-center justify-center border border-blue-500/50 lightning-glow mb-2">
                        <i className="fa-solid fa-radar text-2xl text-blue-400 animate-pulse"></i>
                      </div>
                      <h2 className="text-xl font-bold text-white">איפה כולם באצטדיון?</h2>
                      <p className="text-sm text-gray-300">התחבר כדי לראות בדיוק מי נמצא איתך באזור ולשתף מיקום.</p>
                      <button onClick={handleGoogleLogin} className="w-full bg-white text-black font-bold py-3.5 rounded-xl flex items-center justify-center gap-3 shadow-lg hover:bg-gray-200 transition active:scale-95">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" className="w-5 h-5" alt="G" />
                        התחבר עם Google
                      </button>
                      {errorMsg && <p className="text-red-400 text-sm mt-2">{errorMsg}</p>}
                    </div>
                  ) : (
                    <div>
                      <div className="flex justify-between items-center mb-4">
                        <div>
                          <p className="text-xs text-blue-300">מחובר כ-</p>
                          <h2 className="font-bold text-white text-lg">{user.displayName}</h2>
                        </div>
                        <button onClick={() => setShowCheckInForm(!showCheckInForm)} className="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md transition active:scale-95">
                           {showCheckInForm ? 'סגור' : 'עדכן מיקום'} <i className="fa-solid fa-location-crosshairs ml-1"></i>
                        </button>
                      </div>
                      
                      {showCheckInForm && (
                        <div className="space-y-4 bg-blue-950/30 p-5 rounded-xl border border-blue-800/50 mb-4 mt-4">
                          <select value={selectedZone} onChange={e => setSelectedZone(e.target.value)} className="w-full bg-black/50 border border-blue-800 rounded-xl p-3.5 text-white font-bold outline-none focus:border-blue-400">
                            {STADIUM_ZONES.map(z => <option key={z} value={z}>{z}</option>)}
                          </select>
                          <input type="text" placeholder="מה המצב? (אופציונלי)" value={statusMessage} onChange={e => setStatusMessage(e.target.value)} className="w-full bg-black/50 border border-blue-800 rounded-xl p-3.5 text-white outline-none focus:border-blue-400" />
                          <div className="flex items-center gap-2 text-sm text-blue-200">
                            <input type="checkbox" checked={useGps} onChange={e => setUseGps(e.target.checked)} className="w-4 h-4 accent-blue-500" />
                            <span>שתף מרחק מדויק לחברים (GPS)</span>
                          </div>
                          <button onClick={handleCheckIn} disabled={isSaving} className="w-full bg-blue-600 py-3.5 rounded-xl font-bold text-white shadow-md active:scale-95 transition flex justify-center items-center gap-2">
                             {isSaving ? <i className="fa-solid fa-circle-notch fa-spin"></i> : 'שמור מיקום'}
                          </button>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div className="space-y-4">
                  {Object.keys(checkinsByZone).map(zone => {
                    const zoneCheckins = checkinsByZone[zone];
                    if (!zoneCheckins || zoneCheckins.length === 0) return null;
                    return (
                      <div key={zone} className="bg-black/60 border border-gray-800 rounded-2xl overflow-hidden shadow-lg backdrop-blur-sm">
                        <div className="bg-gray-900/80 px-5 py-3 flex justify-between items-center border-b border-gray-800">
                          <h4 className="font-bold text-base text-blue-400"><i className="fa-solid fa-map-pin ml-2 text-gray-500"></i>{zone}</h4>
                          <span className="text-[11px] bg-blue-900/50 border border-blue-800 px-2.5 py-1 rounded-full text-blue-200 font-medium">{zoneCheckins.length} חברים</span>
                        </div>
                        <div className="divide-y divide-gray-800/50">
                          {zoneCheckins.map(c => (
                            <div key={c.id} className="p-4 flex gap-4 items-center hover:bg-gray-900/30 transition">
                              <img src={c.photoURL || 'https://placehold.co/100x100/1e3a8a/ffffff?text=🤘'} className="w-12 h-12 rounded-full border border-gray-700 object-cover" />
                              <div className="flex-1">
                                <div className="flex justify-between items-start">
                                  <span className="font-bold text-sm text-white">{c.name}</span>
                                  <span className="text-[10px] text-gray-500 bg-gray-900 px-2 py-0.5 rounded">{timeAgo(c.timestamp)}</span>
                                </div>
                                {c.message && <p className="text-xs text-gray-300 mt-1">{c.message}</p>}
                                {c.location && myLocation && c.userId !== user?.uid && (
                                  <div className="text-[11px] text-green-400 mt-1.5 font-medium flex items-center gap-1"><i className="fa-solid fa-location-arrow"></i> {calculateDistanceDetailed(myLocation.lat, myLocation.lng, c.location.lat, c.location.lng)}</div>
                                )}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* MAP TAB */}
            {activeTab === 'map' && (
              <div className="space-y-4 animate-in fade-in">
                {PLACES.map(p => (
                  <div key={p.id} className="bg-black/60 border border-gray-800 rounded-2xl p-5 flex gap-4 items-center shadow-lg backdrop-blur-sm">
                    <div className={`w-14 h-14 rounded-full bg-gray-900 flex items-center justify-center text-2xl shrink-0 border border-gray-700 ${p.color}`}><i className={p.icon}></i></div>
                    <div className="flex-1">
                      <h3 className="font-bold text-white text-lg">{p.name}</h3>
                      <p className="text-xs text-gray-400 mt-1">{p.desc}</p>
                    </div>
                    <button onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&destination=${p.lat},${p.lng}`, '_blank')} className="bg-blue-600 hover:bg-blue-500 text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-md transition active:scale-90"><i className="fa-solid fa-location-arrow text-xl"></i></button>
                  </div>
                ))}
              </div>
            )}

            {/* TRANSPORT TAB */}
            {activeTab === 'transport' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-blue-900/20 border border-blue-900/50 rounded-2xl p-6 shadow-lg backdrop-blur-sm">
                  <div className="flex items-center gap-3 mb-3">
                    <i className="fa-solid fa-train-subway text-2xl text-red-500"></i>
                    <h2 className="text-xl font-bold text-white">מטרו M2 (הקו האדום)</h2>
                  </div>
                  <p className="text-sm text-gray-300 leading-relaxed">הדרך הטובה והמהירה ביותר לאצטדיון. רדו בתחנת <strong className="text-white">Puskás Ferenc Stadion</strong>. מומלץ לא לקחת מוניות לאזור בגלל עומסי התנועה העצומים!</p>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  <div className="bg-black/60 p-5 rounded-2xl text-center border border-gray-800 shadow-lg backdrop-blur-sm flex flex-col justify-between">
                    <div>
                      <i className="fa-solid fa-car text-3xl text-yellow-500 mb-2"></i>
                      <h4 className="font-bold text-lg text-white mb-1">Bolt</h4>
                      <p className="text-[11px] text-gray-400 mb-4">אין תמיכה ב-Uber בבודפשט.</p>
                    </div>
                    <a href="https://bolt.eu/" target="_blank" className="bg-yellow-500 hover:bg-yellow-400 text-black py-2.5 rounded-xl text-sm font-bold block transition">הורדת Bolt</a>
                  </div>
                  <div className="bg-black/60 p-5 rounded-2xl text-center border border-gray-800 shadow-lg backdrop-blur-sm flex flex-col justify-between">
                    <div>
                      <i className="fa-solid fa-ticket text-3xl text-blue-400 mb-2"></i>
                      <h4 className="font-bold text-lg text-white mb-1">BudapestGO</h4>
                      <p className="text-[11px] text-gray-400 mb-4">כרטיסי נסיעה דיגיטליים</p>
                    </div>
                    <a href="https://bkk.hu/en/tickets-and-passes/budapestgo/" target="_blank" className="bg-blue-600 hover:bg-blue-500 text-white py-2.5 rounded-xl text-sm font-bold block transition">הורדת אפליקציה</a>
                  </div>
                </div>
              </div>
            )}

            {/* CURRENCY TAB */}
            {activeTab === 'currency' && (
              <div className="space-y-4 animate-in fade-in">
                <div className="bg-black/80 border border-gray-800 rounded-2xl p-8 text-center shadow-2xl backdrop-blur-md">
                  <i className="fa-solid fa-coins text-4xl text-yellow-500 mb-4"></i>
                  <h2 className="text-2xl font-bold text-white mb-8">מחשבון המרה</h2>
                  
                  <div className="space-y-6 max-w-xs mx-auto">
                    <div className="flex gap-3">
                      <input type="number" value={exchangeAmount} onChange={e => setExchangeAmount(e.target.value)} className="flex-1 bg-gray-900 border border-gray-700 rounded-xl p-4 text-white text-2xl font-bold text-center outline-none focus:border-blue-500 shadow-inner" dir="ltr" placeholder="0" />
                      <select value={fromCurrency} onChange={e => setFromCurrency(e.target.value)} className="w-24 bg-gray-900 border border-gray-700 rounded-xl p-2 text-white font-bold text-center outline-none focus:border-blue-500">
                        <option value="ILS">₪ ILS</option>
                        <option value="HUF">Ft HUF</option>
                        <option value="EUR">€ EUR</option>
                      </select>
                    </div>
                    
                    <button onClick={() => { const f = fromCurrency; setFromCurrency(toCurrency); setToCurrency(f); }} className="w-12 h-12 bg-blue-600 rounded-full mx-auto text-white flex items-center justify-center hover:bg-blue-500 active:scale-90 transition shadow-lg">
                        <i className="fa-solid fa-arrow-right-arrow-left rotate-90 text-xl"></i>
                    </button>
                    
                    <div className="flex gap-3">
                      <div className="flex-1 bg-gray-900 border border-blue-500/30 rounded-xl p-4 text-center font-bold text-3xl text-blue-400 overflow-hidden shadow-inner flex items-center justify-center" dir="ltr">
                        {convertCurrency()}
                      </div>
                      <select value={toCurrency} onChange={e => setToCurrency(e.target.value)} className="w-24 bg-gray-900 border border-gray-700 rounded-xl p-2 text-white font-bold text-center outline-none focus:border-blue-500">
                        <option value="HUF">Ft HUF</option>
                        <option value="ILS">₪ ILS</option>
                        <option value="EUR">€ EUR</option>
                      </select>
                    </div>
                  </div>
                </div>
