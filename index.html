<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chapter 491 Goes to Budapest</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      -webkit-tap-highlight-color: transparent; 
      background-color: #0a0a0a;
      background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)), url('https://images.unsplash.com/photo-1598387181032-a3103a2db5b3?auto=format&fit=crop&q=80&w=1000');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
    }
    .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom, 20px) + 100px) !important; }
    .lightning-glow { filter: drop-shadow(0 0 10px rgba(59, 130, 246, 0.9)); }
    ::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="text-neutral-200 min-h-screen">
  
  <div id="startup-error" style="display:none; color:white; background:#ef4444; padding:20px; text-align:center; direction:rtl; font-weight:bold; z-index:9999; position:fixed; top:0; left:0; right:0;">
    שגיאת מערכת: אנא נקה את מטמון הדפדפן ורענן את העמוד.
  </div>

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    const { useState, useEffect, useMemo, Component } = React;

    // --- Error Boundary ---
    class ErrorBoundary extends Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      render() {
        if (this.state.hasError) {
          return (
            <div className="p-8 text-center bg-red-900/90 text-white min-h-screen flex flex-col justify-center items-center">
              <i className="fa-solid fa-triangle-exclamation text-5xl mb-4 text-red-400"></i>
              <h1 className="text-2xl font-bold mb-2">משהו השתבש</h1>
              <p className="text-sm mb-6" dir="ltr">{this.state.error.message}</p>
              <button onClick={() => window.location.reload()} className="bg-white text-red-900 font-bold px-6 py-3 rounded-xl shadow-lg">רענן אפליקציה</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC7EreIS4PMeQtPEsQu35y2_UlcNl3c8VI",
      authDomain: "goes-to-budapest.firebaseapp.com",
      projectId: "goes-to-budapest",
      storageBucket: "goes-to-budapest.firebasestorage.app",
      messagingSenderId: "488923007392",
      appId: "1:488923007392:web:8b657382aab11109a2bcc5",
      measurementId: "G-4QXV4Q37KH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const databaseAppId = 'metallica-budapest-app';

    const isWhatsAppOrInApp = /WhatsApp|FBAV|FBAN|Instagram|Line/i.test(navigator.userAgent);

    const getMapUrl = (lat, lng) => `https://maps.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
    const getMapSearchUrl = (query) => `https://maps.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    
    const boltIOS = `https://apps.apple.com/app/id675033630`;
    const boltAndroid = `https://play.google.com/store/apps/details?id=ee.mtakso.client`;
    const bkkIOS = `https://apps.apple.com/app/id1589336495`;
    const bkkAndroid = `https://play.google.com/store/apps/details?id=hu.bkk.budapestgo`;
    const blsTickets = `https://jegy.rock1.hu/`;

    const STADIUM_ZONES = ["Snake Pit", "פלטפורמה", "דשא צמוד לבמה", "דשא עמידה (GA)", "יציע 100", "יציע 200", "יציע 300", "מתחם אוכל", "בדרך לאצטדיון"];

    const PLACES = [
      { id: 'hotel', name: 'Mövenpick Hotel Budapest Centre', type: 'hotel', lat: 47.5023, lng: 19.0531, desc: 'בסיס האם של המשלחת', icon: 'fa-solid fa-hotel', color: 'text-yellow-400' },
      { id: 'stadium', name: 'אצטדיון פושקש', type: 'stadium', lat: 47.5030, lng: 19.0980, desc: 'מקום ההופעה (מטרו M2)', icon: 'fa-solid fa-bolt', color: 'text-blue-400' },
      { id: 'bls', name: 'מועדון Barba Negra', type: 'concert', lat: 47.4526, lng: 19.0594, desc: 'הופעת BLS ב-10.6', icon: 'fa-solid fa-guitar', color: 'text-orange-500', hasTickets: true },
      { id: 'popup', name: 'חנות פופ-אפ מטאליקה', type: 'store', lat: 47.4975, lng: 19.0550, desc: 'מרצ'נדייז רשמי', icon: 'fa-solid fa-bag-shopping', color: 'text-white' }
    ];

    const CURATED_BARS = [
      { name: 'Szimpla Kert', desc: 'ה-Ruin Bar המפורסם בעולם.' },
      { name: 'Instant-Fogas', desc: 'קומפלקס מסיבות ענק.' },
      { name: 'Liquid Rock', desc: 'בר רוק מעולה לחברים.' }
    ];

    function calculateDistanceDetailed(lat1, lon1, lat2, lon2) {
      if (!lat1 || !lon1 || !lat2 || !lon2) return null;
      const R = 6371; 
      const dLat = (lat2 - lat1) * (Math.PI/180);
      const dLon = (lon2 - lon1) * (Math.PI/180); 
      const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * (Math.PI/180)) * Math.cos(lat2 * (Math.PI/180)) * Math.sin(dLon/2) * Math.sin(dLon/2); 
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); 
      const distKm = R * c; 
      return distKm < 1 ? `${Math.round(distKm * 1000)} מטר` : `${distKm.toFixed(1)} ק"מ`;
    }

    function timeAgo(timestamp) {
      if (!timestamp) return '';
      const seconds = Math.floor((Date.now() - timestamp) / 1000);
      if (seconds < 60) return 'עכשיו';
      const minutes = Math.floor(seconds / 60);
      return minutes < 60 ? `לפני ${minutes} דק'` : `לפני ${Math.floor(minutes/60)} שע'`;
    }

    function App() {
      const [activeTab, setActiveTab] = useState('friends');
      const [user, setUser] = useState(null);
      const [checkins, setCheckins] = useState([]);
      const [selectedZone, setSelectedZone] = useState(STADIUM_ZONES[0]);
      const [statusMessage, setStatusMessage] = useState('');
      const [useGps, setUseGps] = useState(true);
      const [isSaving, setIsSaving] = useState(false);
      const [showCheckInForm, setShowCheckInForm] = useState(false);
      const [errorMsg, setErrorMsg] = useState('');
      const [myLocation, setMyLocation] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [exchangeAmount, setExchangeAmount] = useState('100');
      const [fromCurrency, setFromCurrency] = useState('ILS');
      const [toCurrency, setToCurrency] = useState('HUF');

      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) setUser(currentUser);
          else signInAnonymously(auth).catch(() => {});
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user) return;
        const checkinsRef = collection(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins');
        return onSnapshot(checkinsRef, (snapshot) => {
          const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setCheckins(data.sort((a, b) => b.timestamp - a.timestamp));
        });
      }, [user]);

      useEffect(() => {
        if (useGps && navigator.geolocation) {
          const watchId = navigator.geolocation.watchPosition(
            (pos) => setMyLocation({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
            null, { enableHighAccuracy: true }
          );
          return () => navigator.geolocation.clearWatch(watchId);
        }
      }, [useGps]);

      const handleGoogleLogin = async () => {
        setErrorMsg('');
        if (isWhatsAppOrInApp) {
            setErrorMsg('שגיאה: אי אפשר להתחבר מתוך וואטסאפ! פתח בדפדפן רגיל.');
            return;
        }
        try {
            const provider = new GoogleAuthProvider();
            await signInWithPopup(auth, provider);
        } catch (error) {
            setErrorMsg(`ההתחברות נכשלה. וודא שאתה בדפדפן רגיל.`);
        }
      };

      const handleLogout = async () => {
        await signOut(auth);
        window.location.reload(); 
      };

      const handleCheckIn = async () => {
        if (!user) return;
        setIsSaving(true);
        let gps = null;
        if (useGps && myLocation) gps = myLocation;
        try {
            await setDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid), {
                name: user.isAnonymous ? "אורח" : user.displayName,
                photoURL: user.photoURL || "",
                zone: selectedZone,
                message: statusMessage,
                timestamp: Date.now(),
                userId: user.uid,
                location: gps
            });
            setShowCheckInForm(false);
            setStatusMessage('');
        } catch (e) { console.error(e); }
        setIsSaving(false);
      };

      const handleDeleteLocation = async () => {
        if (!user) return;
        setIsSaving(true);
        try {
            await deleteDoc(doc(db, 'artifacts', databaseAppId, 'public', 'data', 'stadium_checkins', user.uid));
            setShowCheckInForm(false);
            setStatusMessage('');
        } catch (e) { console.error(e); }
        setIsSaving(false);
      };

      const convertCurrency = () => {
          const rates = { EUR: 1, ILS: 4.0, HUF: 395 };
          const amt = parseFloat(exchangeAmount);
          if (isNaN(amt)) return '0';
          const result = (amt / rates[fromCurrency]) * rates[toCurrency];
          return toCurrency === 'HUF' ? Math.round(result).toLocaleString() : result.toFixed(2);
      };

      const checkinsByZone = useMemo(() => {
        const grouped = {};
        STADIUM_ZONES.forEach(z => grouped[z] = []);
        checkins.forEach(c => { if(grouped[c.zone]) grouped[c.zone].push(c); });
        return grouped;
      }, [checkins]);

      return (
        <div className="min-h-screen flex flex-col relative pb-safe max-w-lg mx-auto shadow-2xl">
          
          {isWhatsAppOrInApp && (
            <div className="bg-red-600 text-white p-3 text-center text-sm font-bold z-50 sticky top-0 shadow-lg">
                ⚠️ פתח ב-Chrome/Safari כדי להתחבר לחשבון!
            </div>
          )}

          <header className="bg-gradient-to-b from-blue-900/90 to-black backdrop-blur-md border-b border-blue-900 p-4 sticky top-0 z-40">
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-3">
                <img 
                  src="./logo.jpg" 
                  className="w-12 h-12 rounded-full border-2 border-blue-400 object-cover lightning-glow" 
                  alt="Logo"
                  onError={(e) => { e.target.style.display='none'; }}
                />
                <div>
                  <h1 className="text-lg font-bold text-white tracking-wider">CHAPTER 491 <span className="text-blue-400">BUDAPEST</span></h1>
                  <p className="text-[11px] text-blue-200"><i className="fa-solid fa-bolt text-yellow-400 mr-1"></i> ראדאר המשלחת</p>
                </div>
              </div>
              {!user?.isAnonymous && user && (
                <button onClick={handleLogout} className="text-blue-300 p-2 hover:text-white transition"><i className="fa-solid fa-right-from-bracket text-xl"></i></button>
              )}
            </div>
          </header>

          <main className="p-4 flex-1 relative z-10">
            
            {activeTab === 'friends' && (
              <div className="space-y-5">
                <div className="bg-black/60 border border-blue-900/50 rounded-2xl p-6 shadow-xl">
                  {(!user || user.isAnonymous) ? (
                    <div className="text-center space-y-4">
                      <h2 className="text-xl font-bold text-white">איפה כולם באצטדיון?</h2>
                      <button onClick={handleGoogleLogin} className="w-full bg-white hover:bg-gray-200 text-black font-bold py-3.5 rounded-xl flex items-center justify-center gap-3 transition">
                        <img src="https://www.svgrepo.com/show/475656/google-color.svg" className="w-5 h-5" />
                        התחבר עם Google
                      </button>
                      {errorMsg && <p className="text-red-400 text-sm font-bold bg-red-900/40 p-2 rounded">{errorMsg}</p>}
                    </div>
                  ) : (
                    <div>
                      <div className="flex justify-between items-center">
                        <h2 className="font-bold text-white text-lg">אהלן, {user.displayName}</h2>
                        <button onClick={() => setShowCheckInForm(!showCheckInForm)} className="bg-blue-600 px-4 py-2 rounded-xl text-sm font-bold">עדכן מיקום</button>
                      </div>
                      {showCheckInForm && (
                        <div className="space-y-4 bg-blue-950/30 p-4 rounded-xl border border-blue-800/50 mt-4">
                          <select value={selectedZone} onChange={e => setSelectedZone(e.target.value)} className="w-full bg-black/50 border border-blue-800 rounded-xl p-3 text-white outline-none">
                            {STADIUM_ZONES.map(z => <option key={z} value={z}>{z}</option>)}
                          </select>
                          <input type="text" placeholder="הודעה לחברים..." value={statusMessage} onChange={e => setStatusMessage(e.target.value)} className="w-full bg-black/50 border border-blue-800 rounded-xl p-3 text-white outline-none" />
                          <div className="flex gap-2">
                              <button onClick={handleCheckIn} disabled={isSaving} className="flex-1 bg-blue-600 py-3 rounded-xl font-bold text-white transition active:scale-95">שמור מיקום</button>
                              <button onClick={handleDeleteLocation} disabled={isSaving} className="bg-red-900/80 hover:bg-red-700 text-white px-4 py-3 rounded-xl font-bold transition active:scale-95">
                                  <i className="fa-solid fa-trash-can text-lg"></i>
                              </button>
                          </div>
                        </div>
                      )}
                    </div>
                  )}
                </div>

                <div className="space-y-4">
                  {STADIUM_ZONES.map(zone => {
                    const zoneCheckins = checkinsByZone[zone];
                    if (!zoneCheckins || zoneCheckins.length === 0) return null;
                    return (
                      <div key={zone} className="bg-black/60 border border-gray-800 rounded-2xl overflow-hidden">
                        <div className="bg-gray-900/80 px-4 py-2 flex justify-between border-b border-gray-800 text-blue-400 font-bold">
                          <span>{zone}</span>
                          <span className="text-xs bg-blue-900/50 px-2 rounded-full text-blue-200">{zoneCheckins.length}</span>
                        </div>
                        {zoneCheckins.map(c => (
                          <div key={c.id} className="p-4 flex gap-4 items-center border-b border-gray-800/30">
                            <img src={c.photoURL || 'https://placehold.co/100/1e3a8a/ffffff?text=🤘'} className="w-10 h-10 rounded-full border border-gray-700" />
                            <div className="flex-1 text-sm">
                              <div className="flex justify-between font-bold text-white"><span>{c.name}</span><span className="text-[10px] text-gray-500">{timeAgo(c.timestamp)}</span></div>
                              {c.message && <p className="text-gray-400 text-xs mt-0.5">{c.message}</p>}
                              {c.location && myLocation && c.userId !== user?.uid && (
                                <div className="text-[10px] text-green-400 mt-1"><i className="fa-solid fa-location-arrow mr-1"></i> {calculateDistanceDetailed(myLocation.lat, myLocation.lng, c.location.lat, c.location.lng)} ממך</div>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {activeTab === 'map' && (
              <div className="space-y-4 animate-in fade-in">
                {PLACES.map(p => (
                  <div key={p.id} className="bg-black/60 border border-gray-800 rounded-2xl p-5 flex gap-4 items-center shadow-lg">
                    <div className={`w-12 h-12 rounded-full bg-gray-900 flex items-center justify-center text-xl shrink-0 ${p.color}`}><i className={p.icon}></i></div>
                    <div className="flex-1">
                      <h3 className="font-bold text-white text-lg">{p.name}</h3>
                      <p className="text-xs text-gray-400">{p.desc}</p>
                    </div>
                    <div className="flex gap-2">
                        {p.hasTickets && (
                            <button onClick={() => window.open(blsTickets, '_blank')} className="bg-orange-600 hover:bg-orange-500 text-white px-3 rounded-xl flex items-center justify-center font-bold text-xs transition shrink-0">
                                <i className="fa-solid fa-ticket ml-1"></i> כרטיסים
                            </button>
                        )}
                        <button onClick={() => window.open(getMapUrl(p.lat, p.lng), '_blank')} className="bg-blue-600 hover:bg-blue-500 text-white w-10 h-10 rounded-xl flex items-center justify-center transition shrink-0"><i className="fa-solid fa-location-arrow"></i></button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {activeTab === 'transport' && (
              <div className="space-y-4">
                <div className="bg-blue-900/20 border border-blue-900/50 rounded-2xl p-6">
                  <h2 className="text-xl font-bold text-white mb-2"><i className="fa-solid fa-train-subway text-red-500 mr-2"></i>מטרו M2 (אדום)</h2>
                  <p className="text-sm text-gray-300">הדרך המהירה לאצטדיון. רדו בתחנת <strong>Puskás Ferenc Stadion</strong>.</p>
                </div>
                <div className="grid grid-cols-2 gap-4">
                  
                  <div className="bg-black/60 p-4 rounded-2xl text-center border border-gray-800 flex flex-col items-center shadow-lg">
                    <i className="fa-solid fa-car text-3xl text-yellow-500 mb-2"></i>
                    <h4 className="font-bold text-white text-lg mb-4">Bolt</h4>
                    <div className="flex flex-col gap-2 w-full mt-auto">
                        <button onClick={() => window.open(boltIOS, '_blank')} className="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-2 rounded-lg text-[10px] font-bold w-full flex justify-center items-center gap-1 transition">
                            <i className="fa-brands fa-apple text-sm"></i> App Store
                        </button>
                        <button onClick={() => window.open(boltAndroid, '_blank')} className="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-2 rounded-lg text-[10px] font-bold w-full flex justify-center items-center gap-1 transition">
                            <i className="fa-brands fa-google-play text-green-400 text-xs"></i> Google Play
                        </button>
                    </div>
                  </div>

                  <div className="bg-black/60 p-4 rounded-2xl text-center border border-gray-800 flex flex-col items-center shadow-lg">
                    <i className="fa-solid fa-ticket text-3xl text-blue-400 mb-2"></i>
                    <h4 className="font-bold text-white text-lg mb-4">BudapestGO</h4>
                    <div className="flex flex-col gap-2 w-full mt-auto">
                        <button onClick={() => window.open(bkkIOS, '_blank')} className="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-2 rounded-lg text-[10px] font-bold w-full flex justify-center items-center gap-1 transition">
                            <i className="fa-brands fa-apple text-sm"></i> App Store
                        </button>
                        <button onClick={() => window.open(bkkAndroid, '_blank')} className="bg-gray-800 hover:bg-gray-700 border border-gray-600 text-white py-2 rounded-lg text-[10px] font-bold w-full flex justify-center items-center gap-1 transition">
                            <i className="fa-brands fa-google-play text-green-400 text-xs"></i> Google Play
                        </button>
                    </div>
                  </div>

                </div>
              </div>
            )}

            {activeTab === 'currency' && (
              <div className="bg-black/80 border border-gray-800 rounded-2xl p-6 text-center shadow-2xl">
                <h2 className="text-2xl font-bold text-white mb-6">מחשבון המרה</h2>
                <div className="flex flex-col gap-4 w-full max-w-sm mx-auto">
                  <div className="flex gap-2 w-full">
                    <input type="number" value={exchangeAmount} onChange={e => setExchangeAmount(e.target.value)} className="flex-1 bg-gray-900 border border-gray-700 rounded-xl p-3 text-white text-xl font-bold text-center outline-none focus:border-blue-500 w-full" dir="ltr" />
                    <select value={fromCurrency} onChange={e => setFromCurrency(e.target.value)} className="w-20 shrink-0 bg-gray-900 border border-gray-700 rounded-xl text-white font-bold p-2 text-center outline-none">
                      <option value="ILS">₪</option><option value="HUF">Ft</option><option value="EUR">€</option>
                    </select>
                  </div>
                  <button onClick={() => { const f = fromCurrency; setFromCurrency(toCurrency); setToCurrency(f); }} className="w-10 h-10 bg-blue-600 hover:bg-blue-500 rounded-full mx-auto text-white flex items-center justify-center active:scale-90 transition shadow-lg my-1">
                      <i className="fa-solid fa-arrow-down-up-across-line"></i>
                  </button>
                  <div className="flex gap-2 w-full">
                    <div className="flex-1 bg-gray-900 border border-blue-500/30 rounded-xl p-3 text-2xl font-bold text-blue-400 flex items-center justify-center w-full overflow-hidden" dir="ltr">
                        {convertCurrency()}
                    </div>
                    <select value={toCurrency} onChange={e => setToCurrency(e.target.value)} className="w-20 shrink-0 bg-gray-900 border border-gray-700 rounded-xl text-white font-bold p-2 text-center outline-none">
                      <option value="HUF">Ft</option><option value="ILS">₪</option><option value="EUR">€</option>
                    </select>
                  </div>
                </div>
              </div>
            )}

            {activeTab === 'bars' && (
              <div className="space-y-6">
                <div className="bg-black/60 border border-gray-800 rounded-2xl p-6 shadow-lg">
                  <h2 className="font-bold text-white mb-4">חיפוש חופשי בעיר <i className="fa-brands fa-google text-blue-400"></i></h2>
                  <div className="flex gap-2">
                    <input type="text" placeholder="סופרמרקט, פארם..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="flex-1 bg-gray-900 border border-gray-700 rounded-xl p-3 text-white outline-none focus:border-blue-500 w-full" />
                    <button onClick={() => window.open(getMapSearchUrl(searchQuery + ' Budapest'), '_blank')} className="bg-blue-600 hover:bg-blue-500 px-4 rounded-xl text-white active:scale-95 transition shrink-0"><i className="fa-solid fa-search"></i></button>
                  </div>
                  <div className="flex flex-wrap gap-2 mt-4">
                    {['רוק ברים', 'גיטרות', 'סטארבקס', 'אוכל'].map(tag => (
                      <button key={tag} onClick={() => window.open(getMapSearchUrl(tag + ' Budapest'), '_blank')} className="bg-gray-800 px-3 py-1.5 rounded-full text-xs text-gray-300 border border-gray-700 hover:bg-gray-700 transition">{tag}</button>
                    ))}
                  </div>
                </div>
                <div className="space-y-4">
                  <h2 className="text-xl font-bold text-white border-b border-gray-800 pb-2">מומלצים</h2>
                  {CURATED_BARS.map(item => (
                    <div key={item.name} className="bg-black/60 border border-gray-800 rounded-2xl p-4 flex justify-between items-center shadow-lg">
                      <div className="flex-1 pl-2"><h4 className="font-bold text-white">{item.name}</h4><p className="text-xs text-gray-400 mt-1">{item.desc}</p></div>
                      <button onClick={() => window.open(getMapSearchUrl(item.name + ' Budapest'), '_blank')} className="text-red-500 bg-gray-800 hover:bg-gray-700 w-10 h-10 rounded-xl flex items-center justify-center shrink-0 active:scale-90 transition"><i className="fa-solid fa-location-dot"></i></button>
                    </div>
                  ))}
                </div>
              </div>
            )}

          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-black/95 backdrop-blur-xl border-t border-gray-800 z-50">
            <div className="max-w-lg mx-auto flex justify-between px-2 py-2 mb-safe">
              {[
                { id: 'friends', icon: 'fa-street-view', label: 'ראדאר' },
                { id: 'map', icon: 'fa-map-location-dot', label: 'מפות' },
                { id: 'transport', icon: 'fa-train-subway', label: 'תחבורה' },
                { id: 'currency', icon: 'fa-money-bill-transfer', label: 'המרה' },
                { id: 'bars', icon: 'fa-beer-mug-empty', label: 'בילויים' }
              ].map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex flex-col items-center justify-center w-full py-2 rounded-xl transition-all ${activeTab === tab.id ? 'text-blue-400 bg-blue-900/20' : 'text-gray-500 hover:text-gray-300'}`}>
                  <i className={`fa-solid ${tab.icon} text-xl mb-1`}></i>
                  <span className="text-[10px] font-bold">{tab.label}</span>
                </button>
              ))}
            </div>
          </nav>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
